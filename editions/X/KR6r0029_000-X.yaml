body:
  text: 釋迦如來行蹟頌序正順大夫密直司左副代言判繕工寺進賢提學知製教李叔琪述夫業於儒者雖未窮五常之源而行之要知先聖文宣王之垂世立教權輿壼奧有來問者粗說之可稱為儒為釋氏者亦然既捨爾姓而投釋種本師如來出興行化一大事因必先覼縷然後方名為釋子噫無二人儻有焉何未嘗耳目其一二今始興山人默公字無寄為人拙而無華㒵如其心少遊天台山專精空假中手述如來行蹟編之以五字隨句而註書成兩軸規將繡梓以遐傳其愽覽該通則於此毛知鳳矣且如釋迦宗派與金口言之詳未老夫不之學安敢措手於其間末如也已但美其強記而精述云時大元至順庚午四月日晦巖老人書于柯亭釋迦如來行蹟頌并序天台末學浮庵無寄撰集詳夫法性圓融無二相寧存乎依正根塵真如清淨祇一源何隔於自他生佛而眾生昧斯妙理於多劫韜己靈光恒安住三德藏中而恒自昧亦臥在一如牀上然亦不知故我能仁哀茲倒惑欲委家中之寶又示衣裏之珠是以不來而來布身雲於堪忍無說而說滋法雨於沃焦歷四十九年設三百餘會不度而度度窮有識非滅而滅滅入無餘其方便也不可思量其饒益也寧容喻說自雙林到於今日將二千三百年從五印至于此方過六萬八千里而猶遺風遐振兮蕩了煩雲餘澤遠霑兮榮乎槁物蕩蕩慈悲之海巍巍乎恩德之山嗚呼我等眾生以底業緣遊何方所早不親聞梵音之說又未得遭正法之時俄受生於季末之艱亦賦性也頑嚚之甚然而幸承慈化濫預釋門㒵可類於道流行全乖於戒品雖讀誦於經論不解根宗或尋討於記章但希利養是以未有思修之慧安期證得之功若是念之可無耻也竊聞如欲揀邪而入聖正道應先學教而知佛化儀是則已分得於賢聖之心肝亦可為於人天之眼目如是方名佛子不然豈免魔徒且如世流若不知厥父之姓名生沒日時甲乙多少所作眾業高夷巧拙則斯曰人頭之獸也不孝莫大乎是其為釋子若未了本師之氏字誕滅年月壽命遠近所說諸教權實顯密則此稱僧㒵之俗歟不順孰過于茲當知不孝不順之𠎝未免無間無斷之苦夫吾佛出興行化之蹟遺法普被益物之緣世界成住壞空之事劫波大小長短之由布在經論可以鏡焉然我等新學沙彌之輩不能廣尋昧者多矣故今不肖依天台四教儀文又摭諸經論中所著之言及詳眾傳記上所彰之說編以成頌凡七百七十六句而又句中義未顯者仍以本文註于句下使見者易曉焉是則視近見遠據略知廣矣然而援引稍繁言辭未婉縱知眾嘖之歸己庶資新進之初行冀諸達士毋以為誚時天曆元年戊辰臘月既望序述云
