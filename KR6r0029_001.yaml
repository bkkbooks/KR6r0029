body:
  text: 釋迦此云能仁是姓牟尼此云寂默其號也謂仁慈愍物三業離暄雜故如來者十號之首稱謂乘如實道來成正覺也又金剛經云無所從來亦無所去故名如來夫諸佛境界非土非身隨順群機強立依正故一代聖教中總明四土三身謂一染淨同居土凡聖同居二方便有餘土斷見修煩惱三乘人居應身所化應有二劣應化同居土勝應化方便土三實報無障礙土分斷根本無明法身菩薩居報身所化四常寂光土唯妙覺法身所居也今娑婆世界則劣應所化然三身一體四土無別何者法身是體二身是用寂光是體三土是用即體之用三四宛然即用之體三四是一如展拳為指斂指為拳拳是體指則用體用似殊祇是一手我釋主不動寂光而遊化娑婆不捨法身而示現報應是知娑婆即寂光寂光即娑婆報應即法身法身即報應又有一師明四土云一法性土法身所居二自受用土自受用報身所居此二土即前常寂光土三他受用土他受用報身所居為初地已上菩薩現一分細相者即前實報土四變化土變化身所居為地前菩薩及二乘凡夫現一分麤相者即前方便土及染淨同居土或人未別三身四土之義互相諍論幾許誤哉娑婆世界內三千大千國每於一一國各有一須彌娑婆亦云索訶此云堪忍謂此土眾生能堪忍受一切苦惱故也如天道則雖是樂處衰相現時苦勝地獄下之五道則純苦無樂然以苦為樂也三千大千見下文須彌亦云蘇迷盧此云妙高四寶所成東面白銀南青琉璃西黃金北黑玻𭹁是故為妙高於眾山故高高八萬四千由旬入水亦爾俱舍頌云妙高層有四相去各十千旁出十六千八四二千量堅首及持鬘常嬌大王眾次第居四級亦住餘七山由旬亦云由繕那二十四指為肘肘即一尺五寸六尺為弓五百弓為一俱盧舍是六里許即三千尺八俱盧舍為一由旬即二萬四千尺也旁有七山遶皆是七寶成中各香水海眾華滿其中七山者第一持雙山高四萬二千由旬廣亦爾山內水廣八萬由旬第二持軸山高二萬一千由旬廣亦爾山內水廣四萬由旬第三擔木山高一萬五百由旬廣亦爾山內水廣二萬由旬第四善見山高五千二百五十由旬廣亦爾山內水廣一萬由旬第五馬耳山高二千六百二十五由旬廣亦爾山內水廣五千由旬第六象鼻山高一千三百一十二由旬半廣亦爾山內水廣二千五百由旬第七魚觜山高六百五十六由旬廣亦爾山內水廣一千二百五十由旬如是七山間香水海中各有優鉢羅華波頭摩華拘牟頭華奔茶利華遍覆水上次有鹹水海娑竭龍為主中有四大洲四輪王所治鹹海廣三億三萬六千由旬深八萬四千由旬華嚴經云南閻浮提有二千五百大河西瞿耶尼有五千大河東弗波提有七千五百大河北單越有一萬大河四洲合二萬五千大河相續不絕流入大海復有十光明龍王雨大海中水倍過前又有百光明龍王等八十億諸大龍王各雨大海皆悉展轉倍過於前又如是等八十億龍王宮中各別出水流入大海皆悉展轉倍過於前婆竭羅龍王太子閻浮幢宮中出水復倍過前又娑竭羅龍王宮中出水復倍過前其所出水紺琉璃色涌出有時是故大海潮不失時又云大海有四熾然光明大寶布在其底性極猛熱常能飲縮無量大水若無此寶從四天下乃至有頂其中所有悉被漂沒云云娑竭羅此云鹹海以所居處為名而此海中此龍為主餘皆臣屬也又樓炭經云亂風大起吹掘大地深三百三十萬里天下諸水皆流歸之正滿因成大海其味鹹者有三其一曰海中有大魚身長二萬八千里不淨其中是故味鹹餘不具錄四洲者亦云四天下在須彌山四方大海中東曰毗提訶亦云弗波提此云勝身周圍七千由旬形如半月人長十六肘壽五百歲於黑暗中亦見眾色耳識所緣盡一箭道南曰閻浮提亦云贍部洲此云勝金周圍六千五百由旬形如車箱人長三肘半壽一百歲不定西曰瞿陀尼亦云瞿耶尼此云牛貨洲周圍七千由旬形如滿月人長八肘壽二百五十歲眼識所緣山壁無礙眼亦聞聲北曰單越亦云拘盧洲此云勝洲周圍八千由旬形如方座人長三十二肘壽一千歲無中夭者山障外徹見無礙耳之所聞若近若遠皆悉能聞又人之初生成長三洲相似北洲稍異謂此中之人欲心起時熟視女人捨之而去彼女隨後往詣園林彼男女等若是父母中表之親不應行欲者樹不曲蔭各自散去若是非親應行欲者樹曲蔭身隨意娛樂彼女懷姙七八日便產隨生男女捨置道頭諸有行人出指令嗽指出脂乳過七日已其兒成長與彼人等男向男眾女向女眾彼人命𣧩置四衢道有優慰禪伽鳥接彼死屍置於他方此四洲是四輪王所治也金輪王人壽八萬歲時出化四天下銀輪王人壽六萬歲時出化三天下銅輪王人壽四萬歲時出化二天下鐵輪王人壽一萬歲時出化一閻浮提耳此四輪王威德自在七寶具足受用如意一日一夜各能周行所管世界行化十善金輪王則非止周四天下或亦升天外有鐵山遶下列諸地獄日月與星宿迴轉迷盧半鐵圍山高三百二十八由旬廣亦爾經十二億八百七十五由旬周圍二邊各三倍此是小鐵圍山如因本經云須彌山等諸大山王及大海外有鐵圍山高六百八十萬由旬廣亦爾此外又有鐵山高廣亦等此兩山間黑暗之處有地獄名曰阿鼻七重鐵城縱廣正等三十六萬里七層鐵網彌覆其上一切苦事集在其中造上品惡業者感此道身壽一增減中劫一日之中八萬四千生死此處一日閻浮提中六十小劫如是過一中劫展轉至八萬四千劫又有八寒八熱等大獄各有眷屬其類無量其中受苦者隨其作業各有輕重經劫數等地獄者梵語泥黎此云苦具在地之下故以名焉古德引經頌云閻浮提闊七千旬處處皆有孤獨獄或在山林曠野中或在大海江河畔或在城隍社廟間其數八萬四千座故知諸雜小獄無處不有日城量五十一由旬火精珠所成故熱從夏至日至冬至日漸遠旋故漸短光漸阻故漸冷從冬至至夏至漸近旋故漸長漸熱也月城量五十由旬半是白水精珠所成半是黑水精珠所成故冷從朔至望白面漸現黑面漸隱故人見圓相從望至晦白面漸減黑面漸增故人見缺形然其大體實無增減出釋氏會要又因本經云日行長短者六月北行於一日中漸移北向六俱盧舍故漸長六月南行亦復如是故漸短立世論云月之圓缺者若月隨日後行日光翳月漸漸掩覆至十五日覆月都盡若日在月前行日日開淨亦復如是至十五日具足圓滿云云或時有蝕者如經云羅睺阿修羅王障蔽故也而世俗陰陽家之所論異此然亦有據又彼日月一時等照三洲天下南洲中則東洲為暮西洲是旦北洲夜半春秋冬夏晝夜長短悉亦等焉是以俱舍頌云日月迷盧半五十一五十夜半日沒中日出四洲等云云世典云日行遲故一年一周天月行疾故一月一周天星量不等大者十八俱盧舍中者十一俱盧舍小者四俱盧舍其數無量名亦多種各掌人間禍福等事是以若不失其常度則天下泰平聖賢出興苟失其度而現變怪則國必有殃或君主危殂或臣民逆亂歲凶穀貴兵起病行矣如是三光依風而住高四萬二千由旬法華記云日是觀音菩薩化作月是勢至菩薩化作星是虗空藏菩薩化作也凡夫親見大聖者唯日月星可不敬仰四王處山腹忉利居其頂夜摩兜率陀化樂及他化此四天住空壽福轉倍前如是六箇天俱名為欲界四王者東方提頭賴吒天王持國南方毗留勒叉天王增長西方毗留愽叉天王廣目北方毗沙門天王多聞此四天王住須彌山第四層四面權威護世身長半里壽五百歲人間五十年此天一晝夜准人間九百萬歲去地四萬二千由旬忉利此云三十三在須彌山頂四方各八天成三十二帝釋居中彼諸天等身長一里壽一千歲人間百年此天一晝夜准人間三百六十億歲去地八萬四千由旬此二天兩兩交會成陰陽單修上品十善者生此二天也夜摩亦云須燄摩此云時分身長一里半壽二千歲人間二百年此天一晝夜兜率陀亦云覩史此云知足身長二里壽四千歲人間四百年此天一晝夜此二天執手相把成陰陽化樂天身長二里半壽八千歲人間八百年此天一晝夜他化自在天身長三里壽一萬六千歲人間一千六百年此天一晝夜此二天相顧而笑成陰陽已上四天依雲而空居次第去地轉倍於前至他化天去地十三億四萬四千由旬修上品十善兼坐禪者生此四天魔王波旬居此天中從下五趣乃至此天俱名欲界婆娑論問四洲人以日月輪而辨晝夜欲天晝夜云何得知答若鉢特摩華合殟鉢羅華開多樂睡眠爾時為夜若殟鉢羅華合鉢特摩華開少欲睡眠爾時為晝智度論云欲界諸天以燈燭明珠等施故身常光明不須日月光也四禪十八天已離欲麤散猶未出色籠故名為色界四禪十八天者初禪三天一梵眾天身長半由旬壽二十增減二梵輔天身一由旬壽四十增減三大梵天身長一由旬半壽六十增減此天身壽不倍前者以離尋伺難故此三天覆四天下第二禪三天一少光天身長二由旬壽二大劫二無量光天身長四由旬壽四大劫三光音天身長八由旬壽八大劫此三天覆小千世界少光天身不倍前者以離尋伺及王臣難故壽倍餘者苦習易除故第三禪三天一少淨天身長十六由旬壽十六大劫二無量淨天身長三十二由旬壽三十二大劫三遍淨天身長六十四由旬壽六十四大劫此三天覆中千世界第四禪九天一無雲天身長一百二十五由旬壽一百二十五大劫此天身壽減於前天三由旬三劫者以離雲及三灾難故二福生天身長二百五十由旬壽二百五大十劫三廣果天身長五百由旬壽五百大劫已上三天凡夫住處修上品十善兼坐禪者乃生此中又有外道別修無想天攝在廣果身壽亦同四無煩天身長一千由旬壽一千大劫五無熱天身長二千由旬壽二千大劫六善見天身長四千由旬壽四千大劫七善現天身長八千由旬壽八千大劫八色究竟天身長一萬六千由旬壽一萬六千大劫已上五天第三果人居若樂慧人則生此天若樂定人便入四空九大自在天身長壽量無數第十地菩薩所居此九天覆大千世界若論其畫界縱廣所經卒非里數之可度也且如大論云從色究竟天下一大石經一萬八千三百八十三年方始至地云云此四禪天等雖離欲界麤色散心猶為色蘊所縛如鳥囚籠未得自在有處云四禪中以無想為一無大自在以此天色究竟天主故上有四空處定樂勝四禪離色祇四陰故名無色界四空處者一空無邊處壽二萬大劫此天壽不倍前者由初離色縛故二識無邊處壽四萬大劫三無所有處壽六萬大劫四非想非非想處壽八萬大劫此四空處壽不倍前唯增二萬者但由慧劣故也又此四天無別處所不離欲色然所修之業各別故更相不知其所修業勝於四禪故以義排布上耳此四天已脫色蘊祗有受想行識四陰又於八識中無前五識唯有後三識自初禪至非非想天若以凡夫論則唯造還生此地之業及生次上地之業業盡則隨業輪迴永無入道之能總名為三界別則二十五是為一國量一釋迦所化三界者欲界色界無色界也二十五有者四洲四惡趣六欲并梵天四禪四空處無想及那含亦名六趣謂地獄餓鬼畜生脩羅人天也是為一國乃一劣應丈六佛之所化也若是數至千名一小千界小千至一千名一中千界中千至一千名曰大千界如是三千國各有鐵圍遶釋氏會要云鐵圍海內有四洲蘇迷盧山已上二十八天并一日月為一國量數至一千鐵圍都遶名小千界即此小千數至一千鐵圍都遶名中千界即此中千數至一千鐵圍都遶名大千界然則有萬億之所皆為佛之統攝俱被聲教也梵網經疏問瑜伽云一大千有百俱𦙁世界雜集等云俱𦙁量當於百億何故此中唯云百億答億有多種以十萬為億或以百萬或千萬或萬萬為億瑜伽但依十萬為億此經千萬為億是以聖教處處不同然不相違此諸國土等棊布地輪上下有金水風三輪次第擎地輪厚八萬四千由旬經量三倍金輪厚三億二萬由旬經量十二億三千四百五十由旬水輪厚八億由旬經如金輪風輪厚十六億由旬量廣無數此四輪經量但據一須彌山一國量為界論也若據大千論則不可以里數度之世界將成時梵王最初建輔眾欲四空情器次第成下界風輪起量等大千界仰布及傍布猶如槃椽形光音天布雲遍覆風輪上霔大車軸雨水深難可底風擊上成金餘下為水輪空中復降雨水滿金輪上風吹成大地須彌及眾山四洲與河海依舊皆成建二禪福盡者下生勝金洲身巨壽無量飛行光遠照所食地味餅林藤與粳米此諸勝味等貪食輙隨沒次有香稻生人亦爭取食光滅又通亡分生男女根以其宿習故相交行不淨從此子孫繁人民因富盛漸邪行不善死充三惡道畏惡修眾善生三洲六天五趣情與器於是備作焉住二十增減次起壞劫事始從無間獄乃至他化天有情次第捨器界既俱空爾時七日現海枯山石融大地並炎輝大千盡煨燼火焰聳初禪三天次第升咸赴二禪中下空如黑穴成住壞空劫大略已如是於此四刧中八十度增減是為一火劫七火方一水七水更七火然後一風灾火灾從地起壞至於初禪水從二禪起壞器若消鹽風自三禪起壞若乾支節四禪無外灾與殿俱生滅火劫成壞數水次風大踈壞已復還成循環無了期風灾至百轉名一僧祇劫如是無量劫佛出甚希有華嚴經云空中霔雨水滿三千大千世界有風輪起吹成色界諸天宮殿次有風起成欲天宮如是次第有種種風起成須彌等諸大山王次成大地乃至龍宮阿脩羅宮又瑜伽俱舍等論云世界將興大梵天王最初獨建經一增減梵輔梵眾及欲空居四天情器次第成已次下界有大風輪起量等三千大千世界有二種相謂仰周布傍側布仰布為下傍布為墻形如槃椽堅若金剛上有光音天布大金藏雲遍覆風輪雨大洪雨滴如車軸霔滿界中水深十一億二萬由旬後有風起擊水成金厚三億二萬由旬下餘八億由旬而為水輪以風輪所持故不漏不散空中復起諸界藏雲降種種雨滿金輪上次復起風皷水令堅成其地輪第一精妙性者成蘇迷盧山次性成七金山最下性者成諸山地平陸成洲深堰成海從上至下依舊建立光音諸天福盡下生皆化為人身長千尺或二千尺歡喜為食身光遠照飛行自在無男無女自有地肥亦名地味色白味甘𥪰取食之地肥遂沒次生地皮亦名地餅色黃味甘次生林騰亦名林條狀如林形皆生果實割之流汁如無﨟蜜次生粳米可長七十有云四寸次生香稻而有糠麧因食此故便利在身為欲蠲除便生二道具男女根有夫婦焉有田宅焉由貪染故光滅通亡日月始生乃分晝夜人民漸邪行不善業以造惡故生於鬼界旁生地獄覩惡修善漸次生餘東西北洲四王忉利是名成劫住劫可知壞劫者住劫最後無間有情沒而不生爾時壞劫始起從三途四洲及六欲天次第先捨下界既空日光四倍增熱溝池盡涸草木焦然二三日現江河枯竭四五興時海泉乾燥六七並現山石皆融大地炎暉火𦦨上騰初禪諸天奔赴二禪三千世界並為煨燼是為壞劫空劫則世界壞了大空黑暗猶如黑穴如是成住壞空四劫各經二十度增減故成八十度也成劫前一增減成器界後十九增減成有情壞劫前十九增減壞有情後一增減壞器界又住劫二十增減前一唯減後一唯增言增減劫者世界初成此閻浮提八萬國邑聚落人民富樂無有寒熱病惱之者王以正治奉行十善互相崇敬猶如父子人壽無量至住劫之初王不行正人民稍邪其壽遂減至十萬歲如是展轉每百年減一歲減至十歲謂之減劫從此十歲子年倍父增至八萬歲謂之增劫子年倍父者阿含經云十歲時人互相殺害仙人相誡遠離殺生彼人受生倍二十歲復離不與取倍四十歲復離邪婬倍八十歲復離妄語倍一百六十歲復離兩舌倍三百二十歲復離麤語倍六百四十歲復離綺語倍二千五百歲此行難故倍加五百復離貪嫉倍五千歲復離瞋恚倍一萬歲復離邪見倍二萬歲復離非法惡貪邪行倍四萬歲復由孝順父母恭敬沙門梵志脩福業等倍八萬歲有經中八萬四千者即倍中增出也一增減劫計一千六百八十萬年此劫名曰轆轤據二十轆轤劫三萬三千六百萬年如是合八十度增減為一火灾劫復經七度火灾然後方有一度水灾討四十九度成住壞空方成七度水灾共成五十六度成住壞空更七度火灾了然後有一風灾每一風灾經六十四度成住壞空一箇成住壞空總計一十三萬四千四百萬年火灾極壞初禪有尋伺故水灾極壞二禪有喜受故風灾極壞三禪有出入息故火灾事則如上所說水灾者初禪已下火灾成壞經七度已至第八番壞劫之末第二禪中俱生水起壞器世間如水消鹽此水與器一時俱沒所以至第八番火灾之末方一水灾者以第二禪淨光天壽八大劫故如是壞已復成第二禪乃至如前風灾者八七火一七水後於第三禪中俱生風起壞器世間如風乾支節此風與器一時俱沒所以至六十四番壞劫有風灾者由第三禪遍淨天壽六十四大劫故三灾不到第四禪者以捨念清淨故對法論云四靜慮外宮等雖無外灾與宮殿等俱生俱滅說有成壞又劫者此云時分有飢饉劫疾疫劫刀兵劫增劫減劫此皆小劫合一增減或二十增減為一劫此為中劫統八十度增減乃名大劫又有經云如一大城方四十里大論云百由旬滿中芥子有長壽天過三年有經云過百年取一芥去城雖空劫猶未盡此是梵天一劫之壽又瓔珞經云一里十里四十里方廣之石天三銖衣人中日月歲數三年一拂此石盡名為小劫至八十里梵天中有百寶光明珠為日月歲數三年一拂此石盡名為中劫至八百里淨居天中千寶光明鏡為日月歲數三年一拂此石盡名為大劫是一僧祇也又劫章頌云風灾為一數數至不可知此極長遠時名一僧祇劫華嚴經中阿僧祇數在第一百五位慈恩基師云風灾劫數至百餘轉名一阿僧祇若佛出於世必降閻浮洲萬億閻浮中各有一佛出成道轉法輪入滅皆同時如是千百億盧舍那本身譬如淨滿月普現一切水影像雖無量本月未曾二釋氏會要云法王所都則大千之內攝焉若據成都則此閻浮提常為所住又大論云閻浮提三邊等量二千由旬南邊三由旬半北闊而南狹故人面像之佛之所生迦毗羅城乃居天地之中央又昔漢明帝問摩滕法師云佛之出世不從此土何也對曰迦維羅衛國者是三千大千世界百億日月之中央也三世諸佛皆從彼生蓋佛之威神不生邊地地為傾斜故又因本經云閻浮提有五種事勝三天下至他化天一者勇捷二正念三佛出世處四是修業地五行梵行處有經云諸佛不出三天下者以其土人難化故也此土眾生利根捷疾極惡勇猛取道不難是故古往諸佛皆生此土也三千大千都計則成一萬億一國一佛故成千百億是皆迹化佛本是舍那故梵網經云我今盧舍那方坐蓮華臺周帀千華上復現千釋迦一華百億國一國一釋迦如是千百億盧舍那本身又云千華上佛是吾化身千百億釋迦是千釋迦之化身云云然則如月昇空影臨眾水影雖無量月本是一佛亦如是雖迹現於萬億國土而本身是一也盧舍那此云淨滿謂三惑已淨種智圓滿故也於此閻浮提有國名迦維王名是淨夫人號摩耶因本經云劫初時地味地皮地膚等味次第生而既沒後生粳米朝割暮生人貪積之割不復生後相侵盜無能決者議立一智者名三滿多為平等王賞善罰惡眾共給之由是始生民主焉是平等王子孫相承至三十三世善思王乃證轉輪聖王之位王四天下直至師子頰王凡一百一萬五十六王師子頰王生四子一名淨二名白三名斛四名甘露淨王二子一名悉達次名難陀白王二子一名調達次名阿難斛王二子一名摩訶男次名阿那律甘露王二子一名婆娑次名跋陀一女甘露味皆出家證道摩耶此云大幻術謂初生時端正第一國人咸曰此非人之所生乃善化天所化因名為幻術相師占曰此女當生轉輪聖王釋氏會要云天臂城中善覺長者生八女子淨王皆迎入宮以第一摩耶第八波闍波提自娶為妃餘六分與三箇弟王各以為妃周昭癸丑年七月十五夜夫人感瑞夢人乘象入懷既而方有娠自後受天供人間諸勝味不復霑唇舌周昭者此震旦姬周王之號也事實如下此不煩錄因果經普曜經等云釋迦如來為大菩薩名曰善慧生兜率天為諸天主有六十億諸天議言菩薩將降當生何國菩薩答言三千世界閻浮提迦毗羅國最在地心又其國種姓有六十種而釋種熾盛其淨王種族第一甘蔗苗裔聖王之後性行仁賢夫人貞良猶天玉女前五百世常為菩薩母應往降神又瑞應經云菩薩乘白象冠日精發兜率宮諸天翼從滿虗空中作樂散華大光普照降神母胎於是兜率天眾念言我等亦當下生人間菩薩成佛欲聞說法即便託於諸國王臣波羅門長者居士等家凡九十九億是時夫人眠夢見人乘象入懷夢悟自知身重天獻飲食自然而至不復樂於人間之味此乃周昭王即位二十三年癸丑七月十五日也明年甲寅歲四月初八日從右脇誕生端正好男子生時靈瑞事不可具言說天雨華散地龍噴水浴身生已蓮承足四方各七步兩手指天地即作師子吼天上及天下唯我為獨尊父母共異之命名為悉達召諸相者占占已皆奏曰年登十九歲必作轉輪王若便出家者當證一切智又有香山仙禮已自悲泣瑞應經云菩薩住胎十月滿足四月八日夫人將諸采女遊藍毗尼園攀無憂樹欲牽摘華菩薩從母右脇而生于時樹下七莖蓮華自然而生大如車輪菩薩隨蓮華中四方各行七步涅槃經云十方右手指天左手指地目顧四方云天上天下唯我獨尊利益一切人天矣釋梵諸天雨妙香華作諸伎樂瓔珞天衣不可稱數九龍吐水一涼一溫灌太子身放大光明遍照三千大千世界如斯瑞應有三十四文煩不錄同日八大國王皆生太子諸釋種姓生五百男國中居士長者悉亦生男及八萬四千厩馬生駒其一揵陟也宮中五百伏藏發現又諸大商採寶俱還群臣內外見此瑞相歎未曾有因名薩婆悉達多華言頓吉皆由生時有諸吉祥頓現故也王召國中諸善相波羅門相之皆曰年至十九當作輪王若出家者成等正覺又香山有五通仙人名阿私陀見太子而禮其足忽然泣曰若出家則必成一切智我今年已百二十矣不久命𣧩生無想天不聞說法故自悲耳又諸經論傳佛生年月日等互說不同或云夏末王時生或云商王代中生或云東周平王戊午歲生或云桓王乙丑歲生如此異說不足為信如辨正論引周書異記云昭王即位二十四年甲寅四月八日江河泉池汎溢山川土地悉震是夜五色光氣入貫大微遍於西方作青紅色上問太史蘇由是何祥耶對曰有大聖人生西方故也一千年後聲教當被於此於是鐫石誌之埋於南郊天祠前又漢明帝問摩滕法師曰如來生滅可得說示乎對曰佛於癸丑七月十五日託陰摩耶夫人甲寅四月八日從母右脇而生阿含瑞應等經亦同斯說是則豈可以一二處異說疑多同說乎是以釋氏會要云兩方相接三藏所傳以周照王時佛生理為長也若准周正則今之江表以建巳月為佛生者謬矣如薩婆多論說二月八日佛生者明矣產後第七日母沒生忉利姨母大愛道乳育忘劬勞端應經云摩耶產太子後七日命終以懷菩薩功德大故生忉利天有經云太子自知福德威重無有女人堪受禮者故因將終託之而生又大權經云菩薩在兜率觀后餘壽十月故託神也大愛道梵云摩訶波闍波提乳養太子身心匪懈太子成道後隨出家受記作佛號一切眾生喜見也七歲智過人眾藝無不通十歲力無敵擲象又能射出曜經云太子七歲王以聰明婆羅門名曰選友為太子師太子問曰以何書典而相教耶其師答曰梵佉留書太子曰其異書者有六十四今師何言止有二種耶師問何等名耶答曰梵書佉留書龍鬼書阿脩倫書等也分別本末師不能達深生慙愧而白王言太子乃天人之師我安教耶凡諸技藝算射天文地理自然知之因果經云太子年至十歲王勑太子與難陀調達及五百童子又復唱令國中萬姓有勇力者定日集於戲場捔射至期調達領眾先出有象當門以手擗倒難陀足跳路側太子擲於空中以手還接不令傷損既至園已標皷射之調達竪四十里皷不能得過難陀竪六十里皷亦莫越爾太子竪百里皷弓力乏折乃取祖王鎮庫之弓古今無能張者太子既挽聲振于城箭中皷已透入於地泉水涌出西域記云其泉至今存焉一切病人飲則便愈復逶鐵圍之山大千剎土六反震動大眾悚然怪未曾有逮其年十七父王欲娉妃普集諸釋女萬選得一人名曰耶輸陀端正最無匹太子雖納之殊無世俗心耶輸陀羅此云華色端正第一即宿世賣華女名瞿夷也以宿願故今亦作妃宿世之事文煩不錄太子雖納而無俗意久而不接太子夜中但修禪觀諸妓女等咸疑太子非男也亦謂無根又有經云太子有三妃第一名瞿夷不孕第二名耶輸陀羅生羅睺羅第三名瞿波云云一日啟父王遊觀四門外行見四種相謂生老病死瑞應經云太子一日前白王言欲出遊觀王勑有司整治衢道皆令清淨并諸官屬噵從太子出城東門見一女人在於道傍初產兒者兒墮于地在於膿血糞穢之中苦痛啼哭次出南門見一老人頭白背傴形枯色衰拄杖羸步次出西門見一病人肉消骨露喘息呻吟不能自持兩人扶腋在於路傍次出北門見一死人眷屬圍遶哀哭送之太子見此四種相已問諸從者是何相等從者一一答陳其故太子又問唯此四人乎餘亦爾耶從者答言世人皆爾無一免者太子歎曰云何世人貪樂不畏於是下馬息樹有一沙門持鉢執錫視地而行過太子前因問答云我是比丘能破結賊不染六塵便現神通騰空而去上之四相及此比丘皆淨居天子之所化作警悟太子故也見此既還宮懷憂心不悅父王大怪之欲解其憂心為作諸樂事竟不革初心但自思出家欲離其四患太子遊四門外見諸不祥還宮憂惱父王驚怪責諸從者卿等云何不治衢道以諸不祥令見之乎群臣奏對奉王嚴命無不撿察不知來處忽現於前非臣之罪王知天變不罪諸臣於是欲令太子解憂為作百千種樂又加端正妓女以娛樂之終不迴心殷勤白其父願聽我出家王聞流淚言應當息此懷此患古難免汝獨何預憂苦能有後嗣吾當從汝願太子順父語指其妃腹言劫後第六年必當生男子太子欲求出家王泣不許殷勤不已王言汝若有子則聽出家太子即指耶輸腹言却後六年汝當生男既而太子出家後六年耶輸果生一子諸釋咸嗔欲治欲殺妃臨火坑誓曰我若為非子母俱滅若其遺體天當為證因抱子投坑變為蓮池蓮華奉體王及國人始復不疑有經云羅睺羅宿世作一國王其兄捨世而為道士預眾修道一夜誤用他瓶之水明向眾懺願以法罰道眾議言此非實垢而不用聽復詣王所切請治罪其罪輕故不囚囹圄乍禁後園因事忘之六日不開以是因緣六年在胎又耶輸陀羅往劫與母偕行路遠身疲妄稱要緣所持之物寄母先行故落後行經六里許由是之故六年懷姙父不信斯語心知不敢留常令四兵衛妃亦不暫離相師奏曰太子今不出家過七日已轉輪王報自然來應王聞歡喜即勑群臣日夜嚴備四兵擎衛城門開閉聲聞四十里復勑耶輸倍加防察壬申二月八半夜人定時太子命車匿彼揵陟將來四天捧馬足釋梵執幡盖衛持出北門諸天忽不現行至三由旬憩息閑林中冠瓔付車匿迴上父王處以劒刓鬚髮即發如是願所有諸眾生如我除煩惱太子年到十九壬申二月八夜諸天下來太子之前頭面禮足白言無量劫來勤苦修行今之成熟出家是宜太子答言王勑內外官屬防衛嚴密欲出無從諸天白言我等方便使無知者太子即命車匿彼揵陟來四天大王捧馬四足并接車匿釋梵執盖北門自開不令有聲出城既畢諸天忽隱詰旦太子與車匿行三由旬屆閑靜林小歇於是唱言過去諸佛為求菩提捨弃飾好剃除鬚髮我今亦爾便脫寶冠與瓔珞等分付車匿廻上父王即以利劒自刓鬚髮帝釋接髮上天起塔車匿大哭馬亦悲鳴緣路而歸父王姨母及耶輸等不見太子哀呼悶絕舉國悲慕推求不得也至於獵師處寶衣易布衣遍詣眾仙所歷問修道法皆非解脫道調彼而捨去竟到尼連側獨坐靜其慮太子斷髮已至獵師處以七寶衣貿得麤布僧伽梨衣著之詣跋伽仙林見諸仙人草樹皮葉以為衣者或食華果草木或日止一食或三日一食或事水火日月或倒荊棘之上或臥水火之前苦行如此乃問其故答欲生天太子告言諸天雖樂福盡輪迴終為苦趣云何修諸苦因以求苦報辭而別往阿羅邏迦蘭仙人所詰其所斷生老病死之法仙人答言若欲斷者修習禪定離欲不善法得初禪乃至離於種種相入非非想處是則名為究竟解脫是諸學者之彼岸太子思惟其所知見非究竟處但盡麤結猶細結在非度彼岸太子調伏是二仙已求勝法故遂復前進至尼連河側安禪靜坐王聞益憂惱擇遣五人侍一日食一麻七日食一麥三人不耐苦弃捨便他去二人侍左右六年無改心父王聞之倍加懊惱即選國中豪賢多子孫者五人各遣一子其名曰憍陳如摩訶男拘利太子十力迦葉般剌蜜諦等追侍太子若或行時踰山涉谷行不擇路五人不耐其艱言此狂人奚可隨之設委而還王滅吾家不如止此太子靜坐苦行林中守戒日食一麻一麥七日食一麻米設有乞者亦以施之五人相從既久難堪其苦三人捨去太子作是念我今行苦行形瘦如枯木命絲幾欲絕自餓非真道無益於己他我當受飲食然後方成佛近有牧牛女乃為施乳麋菩薩既受之二人驚又去太子苦行六年瘦若枯木於是作念我若以此羸身取道彼諸外道當言自餓是涅槃因我當受食然後成道作是念已淨居天子下來勸彼林外牧牛女難陀婆羅令取亂麋供養既受食竟身體光悅二人見驚謂為退本又捨而去癸未二月八獨詣菩提樹降魔成正覺具無量功德太子獨詣畢跋羅樹同過去佛以草為座帝釋化人執獻淨軟草受已敷座結加趺坐觀樹思惟感天動地演大光明覆弊魔宮波旬恐怖令其四女往太子所萬端妖媚惑之不動波旬復將八十億眾故來惱壞而作是言若不起去擲汝海中菩薩荅言汝先動我淨瓶然後可能擲我八十億眾盡力不能令瓶小動波旬又勑閻羅大王阿鼻苦具一切都舉向菩薩所菩薩徐舉白毫地獄罪人心得清涼稱南無佛尋脫苦所波旬前近欲與相難菩薩以智慧力申手按地地為震動魔及兵眾顛倒而墮菩薩降魔已竟結解漏盡生死已斷明星出時霍然大悟成等正覺具十八法十種神力四無所畏于時大地十八相動天作伎藥散花燒香天龍八部所設供養充塞虗空此乃周穆王即位第三年癸未二月八日夜太子是年年登三十矣又上云十八法者一身無失二口無失三念無失四無異相五無不定心六無不知已捨七欲無減八精進無減九念無減十慧無減十一解脫無減十二解脫知見無減十三一切身業隨智慧行十四一切口業隨智慧行十五一切意業隨智慧行十六知過去世無礙十七知未來世無礙十八知現在世無礙也十力者一是處非處力二業力三定四根五欲六性七至道處八宿命九天眼十漏盡也四無所畏者一一切智無畏二漏盡三說障道四說苦盡道也十八相者謂震吼覺動起涌六種一一各三謂震遍震等遍震餘五亦然故成十八焉又菩提留支引經頌云八年作孾孩七年作童子四年學五明十年受五欲一十九出家六年行苦行三十五成道七十九入滅又梵網經云七歲出家三十成道如是三說不同者以大小機見異故爾時作是念我所得妙法當廣應開演利樂於一切菩薩既成道已於三七日中思惟利生方便如法華經云我始坐道場觀樹亦經行於三七日中思惟如是事初七日思我所得智慧微妙最第一眾生諸根鈍著樂癡所盲如斯之等類云何而可度爾時諸梵王及諸天帝釋護世四天王請我轉法輪二七日思我即自思惟若但讚佛乘眾生不信受破法墮惡道我寧不說法疾入於涅槃三七日思尋念過去佛所行方便力我今所得道亦應說三乘云云思惟是已即趣奈苑二十年中說四阿含經八年說方等諸經二十二年說諸部般若八年說法華涅槃二經度盡有緣之眾能事已畢年到七十九入般涅槃也大綱如是今引祖文略示其要如天台四教儀云智者大師以五時八教判釋東流一代聖教罄無不盡言五時者一華嚴時二鹿苑時三方等時四般若時五法華涅槃時是名五時言八教者頓漸秘密不定此四名化儀如世藥方藏通別圓此四名化法如辦藥味是為八教第一華嚴時者如來初成正覺在寂滅道場四十一位法身大士及宿世根熟天龍八部一時圍遶如雲籠月爾時如來現舍那身說圓滿脩多羅故名頓教第二鹿苑時者佛為三乘根性於頓無益故不動寂場而遊鹿苑脫舍那珍御之服著丈六弊垢之衣亦從兜率降下託胎出胎納妃生子出家苦行六年已後木菩提樹下以草為座成劣應丈六身佛為三乘根人說生滅四諦十二因緣事六度等法諸人聞已依教修行證偏真理第三方等時者彼二乘人貪著小乘謂是究竟不能預大故說維摩思益楞伽楞嚴三昧全光明勝鬘等諸大乘經憚偏斥小歎大褒圓彼二乘眾聞是法已內懷慙愧心漸淳淑耻小慕大也第四般若時者機根漸熟次說摩訶般若金剛般若光讚般若大品般若等諸部般若命空生身子轉教菩薩令知諸法融通淘汰已上三時對華嚴頓故總名為漸第五法華涅槃時者機緣已熟可令開示悟入佛之知見次說法華開前頓漸會入非頓非漸故言開權顯實會三歸一廢權立實彼諸聲聞般若時受勑轉教皆知法藏故至法華會上開示悟入佛之知見授記作佛而已次說涅槃者有二義一為未熟者更說四教具談佛性令具真常入大涅槃故名捃拾教二為末代鈍根於佛法中起斷滅見夭傷慧命亡失法身設三種權扶一圓實故名扶律談常教若論時味與法華同論其部內純雜小異何者法華純說圓教涅槃雜說四教故也問五時與頓漸之義如是秘密不定藏通別圓其義云何答秘密教者前四時中如來三輪不思議故或為此人說頓或為彼人說漸彼此互不相知能令得益故名秘密教不定教者於四時中佛以一音演說法眾生隨類各得解此則如來不思議力能令眾生於漸說中得頓益於頓說中得漸益如是得益不同故名不定教藏等四教行人修行斷惑證道之法不可具錄今當略示言藏教者小乘三藏也一修多羅藏即四阿含經二阿毗曇藏即俱舍婆沙論三毗尼藏即五部律等聲聞依生滅四諦修行斷三界見思惑盡證偏真理緣覺觀十二因緣覺真諦理此人斷見思盡更侵習氣故居聲聞上菩薩依四諦境發四弘願修六度行滿三阿僧祇劫入世第一位發真無漏頓斷見思習氣木菩提樹下成劣應丈六身佛為鈍根三乘人說生滅四諦現老比丘相入無餘涅槃言通教者通前藏教通後別圓又此教三人同以無言說道體色入空故名通教聲聞但斷三界見思惑盡不能侵習如燒木成炭辟支佛更侵習氣如燒炭成灰菩薩正使斷盡與二乘同扶習潤生遊戲神通淨佛國土機緣若熟頓斷殘習七寶菩提樹下天衣為座現帶劣勝應身成佛為三乘人說無生四諦此藏通二教三人所證雖同大小巧拙永異何者藏則小拙謂不通於大故小析色入空故拙雖當教內三人上中下異望通三人則一概鈍根通則大巧謂大乘初門故大體色入空故巧雖當教內三人上中下異若望藏教則一概為利般若方等部內共般若等即此教也言共般若者共二乘法說也言別教者別前二教別後圓教故也諸大乘經廣明菩薩歷劫修行行位次第互不相攝並此教之相也此教菩薩行位次第有五十二謂十信十住十行十迴向十地等覺妙覺也十信伏三界見思煩惱初住斷見七住斷思與藏通二佛齊十住斷界內塵沙惑伏界外塵沙十行斷界外塵沙十向伏無明習中觀登初地破一分無明證一分三德謂法身般若解脫也現身百界八相成佛化度群生然不知上地菩薩舉足動步次入二地千界作佛如是地地功德十倍從此至妙覺破十二品無明坐蓮華藏世界大寶花王座現圓滿報身成佛為鈍根菩薩眾說無量四諦言圓教者諸大乘經說佛境界不共三乘位次捴屬此教如華嚴云初發心時便成正覺所有慧身不由他悟法華云開示悟入佛之知見維摩云入此室者唯聞諸佛功德之香有經云如人浴大海已用諸河水如是等類並屬此教此教位次如別教五十二位然別則位位互不相攝圓則位位相攝如帝網珠珠珠相映於此五十二位更加五品弟子位謂一隨喜品二讀誦品三說法品四兼行六度品五正行六度品此位圓伏五住煩惱即外凡位與別十信同次追六根淨位即十信也初信斷見現真理七信斷思十信斷界外塵沙與別住行向齊次入初住斷一品無明證一分三德現身百界八相化物與別初地齊華嚴云初發心時便成正覺者即此位成佛是乃此教真因謂成妙覺謬之甚矣從此至第二行各斷一品無明增一分中道與別妙覺齊三行已去別教之人尚不知名何況伏斷故以我家之真因為汝家之極果從三行去至於妙覺破三十品惑究竟登涅槃山頂諸法不生般若不生不生不生名大涅槃以虛空為座成清淨法身佛居常寂光土說無作四諦是為五時八教之大綱具如天台妙玄中說初在寂滅場十方賢聖會文殊普賢等法身諸大士及與眾龍天拱之為影響佛現舍那身頓說華嚴經是法不思議法界以為體一塵含十方剎那攝三際一多即無二三法無差別清淨妙法身湛然應一切初發道心時即便成正覺又令諸大士各談五位法亦有善財童歷參諸善友各隨其所問答示種種法如是圓滿教大山機所擔小雖在其座猶如聾瘂等譬如喪家子一日到其舍見父勢尊嚴畏懼便他走華嚴以法界為體圓融無礙一多不二該括始終無出無沒不可思議剎那此云一念三際是過去現在未來也謂一念之中諧盡三世之際三法者佛法心法眾生法經中有如來林菩薩云如心佛亦爾如佛眾生然心佛及眾生是三無差別又有金剛幢法慧等諸大士眾承佛神力各說五位法門謂住行向地等妙覺也又善財童子覺城東畔初遇文殊頓證法界自此歷參五十三知識因問各答所知一法大山機者經云譬如日出先照須彌等諸大山王佛日亦爾先照菩薩諸大山王云云是以二乘雖在一席如聾若瘂故四教儀云所說法門雖廣大圓滿攝機不盡故未暢如來出世本懷也喪家窮子事如下注佛即作是念若但讚佛乘眾生不信受破法墮惡道我寧不說法疾入於涅槃尋念過去佛所行方便力我今所得道亦應說三乘是時十方佛皆現讚善哉如諸佛所行且設方便事脫舍那珍服著丈六垢衣不動寂滅場而遊鹿野苑先為前五人轉四諦法輪聞已即成果世有三寶名從茲十二年說四阿含經諸有三乘人依修皆證道是名半字教黃葉止啼耳如父設方便引子令除糞止得一日價便自以為足法華偈云作是思惟時十方佛皆現梵音慰喻我善哉釋迦文第一之導師得是無上法隨諸一切佛而用方便力我等亦皆得最妙第一法為諸眾生類分別說三乘我聞諸佛音即趣波羅奈諸法寂滅相不可以言宣以方便力故為五比丘說云云又珍服垢衣以譬為言如法華經說今示其略有一長者失子既久其子遊行遂至父舍見父尊嚴畏懼而走父遙見之審知是子遣使捉來窮子驚喚迷悶躃地長者方便脫其珍服即著垢衣乃接其子以喻如來現舍那身頓說華嚴二乘如䏊竟無所益如設方便現丈六身說生滅法乃令入道然不離寂場而遊化鹿苑不捨本身而示現迹形言鹿野者昔群鹿所居以之名也事如大論中說佛趣鹿苑作是思惟我欲開於甘露法門誰應先聞因念憍陳如等五人悉皆聰明又夙有願先應度之時五人等投佛出家世尊喚言善來比丘鬚髮自落袈裟著身即成沙門佛問汝知色受想行識為是常無常為是苦非苦為是空非空為有我非有我五人聞已漏盡意解成阿羅漢即便答言是五陰法實是無常苦空無我諸天唱言如來今日轉大法輪世有三寶謂如來是佛寶四諦是法寶五羅漢是僧寶為諸天人第一福田又三寶亦云三尊此三尊稱寶者何寶性論云三寶有六義一者希有義如世珍寶貧窮之人所不能得三寶亦爾薄福眾生萬劫難值二者離垢義如世珍寶體無瘕謫三寶亦爾隨離諸垢三勢力義如世珍寶除貧去毒有大勢力三寶亦爾具不思議大神通力四莊嚴義如世珍寶能嚴身首令身殊好三寶亦爾能嚴行者令身清淨五最勝義如世珍寶諸物中勝三寶亦爾一切世中最為殊勝六不改義如世真金燒打磨煉不能改變三寶亦爾不為世間諸法改故四阿含者增一阿含長阿含中阿含雜阿含也此中分別三界之法極至二乘之果但是九部經耳九部名目文煩不錄半字黃葉二譬出涅槃經如有長者教諸癡子先教半字後授滿字則能易解佛亦如是為鈍根人先教小法漸令入大又如嬰兒啼哭不已母將黃葉弄而與之兒謂是金悅而不啼二乘亦爾證二涅槃謂是究竟自以為足華嚴與阿含一時無前後小見丈六佛但說阿含經大覩舍那佛恒說華嚴經一佛一音說機見乃不同譬如但一水四見各殊異又如五天王見一珠各色華嚴阿含一時者佛身是一法門無二而機見各異何者三藏機見佛在木菩提樹下生草為座現劣應身說生滅四諦通教機見佛在七寶菩提樹下天衣為座現帶劣勝應身說無生四諦別教機見佛在蓮華藏世界大寶華王座現尊特報身說無量四諦圓教機見佛在常寂光土以虗空為座現清淨法身說無作四諦是則如將一水天見琉璃人見水魚見屋鬼見火又如佛以隨色摩尼珠示五方天王云此珠何色東曰青南曰赤西曰白北曰黑中曰黃互說異色而珠圓明無定色也佛身亦爾清淨無礙但隨機緣示現四身非止四身隨類攝化則普現六道四生無量種身也若局論則華嚴攝在阿含時中若通論則華嚴時長通至五時何者彼經云常說恒說無時不說故也佛憫鈍根人貪著小三藏謂是究竟法不生樂大心欲令入大乘八載說方等彈偏以褒圓斥小而歎大毀訾二乘人如焦芽敗種是斷佛種者諸佛所難化二乘聞此語泣動大千界迴心耻小法而生慕大志如子不畏父雖出入其門猶謂客賤人止宿草庵中第三方等時對半說滿四教俱說彈斥偏小褒揚圓大二乘聞已耻小慕大得通教益訶嘖二乘事如淨名等經說如彼窮子到其父舍為除糞穢經二十年長者告言汝如吾子由是之故於其門內入出無難猶處門外止宿草庵二乘亦爾雖聞方等大乘之法而謂是菩薩事非己智分不肯迴小向大猶居羅漢次經廿二年說諸部般若諸法皆清淨色空無𦊱礙佛說法度生而無聞說者菩薩行六度亦無能所相求佛以色聲是人甚邪倒觀法離人我乃名真佛子佛說如是義加空生身子轉教諸菩薩令知法寶藏菩薩聞是法日夜勤精進得受諸佛記當成無上道而彼二人等雖能為他說以為非己分永無希取想如子受父勑領知諸寶藏猶未捨劣心無懷取一喰第四般若時但說空理破諸有相言諸法者謂一切世間陰界入等及與三乘諦緣度法乃至諸佛十力菩提如是諸法悉皆清淨無二無別是以大般若云五蘊清淨故一切智智清淨乃至諸佛無上正等菩提清淨又金剛經云若以色見我以音聲求我是人行邪道不能見如來又云離一切諸相則名諸佛又云菩薩應如是降伏其心我應滅度無量眾生而無有一眾生得滅度者何以故若菩薩有我相人相眾生相壽者相則非菩薩般若論云其說法者無說無示其聽法者無聞無得淨名云平等真法界佛不度眾生空生則須菩提也以其生時家中庫藏皆空故以名焉身子則舍利弗也舍利母之姓弗者翻云子也以其母身好故竺人皆稱身子空生解空第一身子智慧第一而此二人易解般若之義故佛以般若加此二人轉教菩薩令知法藏心漸通泰如彼窮子受其父勑領知眾物而無希取一喰之意下劣之心亦未能捨佛知機已熟如癰將欲潰久默之本懷正當可暢時次至靈鷲山三周說法華開權顯真實會三歸一乘諸法本寂滅世間相常住龍女頓成佛聲聞受佛記天人及鬼畜乃至蜎𧍃類一切有心者無一不成佛當知佛知見蘊在眾生心盡令開悟入一大事圓成父知子心大命聚王與族家珍悉以付相對共歡娛佛興于世者但為一大事因緣故也何謂大事因緣欲令眾生開示悟入佛之知見而機宜不同故始自華嚴終至般若於其中間先以專大次復專小或半滿相對或權實相隔橫說竪說廣演諸法逗機益物無有毫差然非本懷也及靈山說法華經令三乘九界咸悟一佛乘乃暢本懷大事因緣妙極於此三周者法說周譬喻周因緣周上根於法說周悟佛知見得記作佛而中根抱迷未遣次說火宅三車譬乃得領解得受佛記又有下根猶未能解次說過去因緣乃能悟入皆受記莂開權顯實者開前四時三教之權顯一佛乘實相之真又開眾生三毒妄心即顯諸佛三德實相會三歸一者融會三乘顯一佛乘天台智者大師以本迹二門消釋謂從序品至安樂行品十四品名為迹門從涌出品盡經十四品名為本門諸經中本迹以寂場所成法報為本從本所起勝劣兩應為迹今經取塵點劫前本坐道場所成三身為本自大通中間乃至今日所成三身皆名為迹妙樂記云他人不見今經本迹但知從勝專求法身如此法本與眾經共勝翻成劣若得久本則近迹不失若但云法身尚失中間何況遠本玄義云迹與諸經有同有異本與諸經一向永異解曰迹與諸經同者謂諸部中圓異者諸部中兼三教故本則一向永異者諸部中不明久遠之本故也說迹事已周欲顯本地壽召致本眷屬說所未曾說佛從成佛來無量僧祇劫剎塵剎塵數其劫過於是一生補處尊尚不窮其限況餘諸薩埵焉能知少分雖云入涅槃是亦非真滅如醫去他國為治狂子故如來壽量品云我成佛已來無量無邊阿僧祇劫譬如五百千萬億那由他阿僧祇三千大千世界末為微塵過於五百千萬億那由他阿僧祇國乃下一塵如是展轉盡是微塵是諸國土可得知其數不彌勒菩薩等俱白佛言是諸世界無量無邊我等於是事中亦所不達佛言是諸世界若著微塵及不著者盡以為塵一塵一劫我成佛已來復過是數自從是來我常在此娑婆世界說法教化亦於餘處無量國土導利眾生乃至云譬如良毉善治眾病是人多諸子息以有事緣遠至餘國諸子於後飲他毒藥是時其父還來歸家見諸子等或失本心或不失者依方煉藥與之令服不失心者飲藥病愈餘失心者而不肯服父作是念我今當設方便令服此藥即作是念我今衰老死時已至是好良藥今留在此汝可取服作是教已復至他國遣使還告汝父已死是時諸子聞父背喪心大憂惱而作是念若父在者憐愍救護今者捨我遠喪他國自惟孤露無復恃怙心遂醒悟乃服其藥病悉除愈佛亦如是若久住世薄德眾生見佛常在便懷厭怠不生難遭之想恭敬之心是故如來雖不實滅而言滅度云云本眷屬者佛說迹竟欲顯本地本時弟子從地涌出數不可說皆久植德本具諸三昧有大神通非是伽耶成佛所化如父少子老令眾不信是故如來說壽長遠以決眾疑令獲大利十信佛說壽命時得益者無數八界微塵眾皆發菩提心復有諸菩薩增道損生多或證三賢位或登十聖地或入金剛心鄰于大覺地獲斯勝利者大千剎塵數分別功德品云佛說壽命長遠時六百八十萬億那由他恒河沙眾生得無生法忍復有千倍菩薩得聞持陀羅尼乃至一四天下微塵數菩薩一生當得阿耨菩提又云其有眾生聞佛壽命長遠如是乃至能生一念信解所得功德無有限量若有善男子善女人為阿耨多羅三藐三菩提故於八十萬億那由他劫行五波羅蜜以是功德比前功德百分千分百千萬億分不及其一乃至筭數譬喻所不能及若有人有如是功德於阿耨菩提退者無有是處又妙玄中云聞本地功德轉更深廣不可稱量不比前來迹中之益何者佛境轉深功德亦大是以令此諸菩薩等增道損生道即三德生即無明至於極位也白蓮結社文中云佛世當機尚未早聞久遠之壽我等當此後五百歲聞佛開顯本地壽量以結勝緣豈不慶快乎如是圓妙法多年默不說今朝乃開演如王解髻珠是名圓中圓亦為王中王醍醐之上味眾病之良藥一念隨喜者其福不可限佛說是經時人間歲八周經云譬如強力轉輪之王兵戰有功賞賜諸物象馬車乘及諸田宅或與衣服種種珍寶奴婢財物歡喜賜與如有勇健能為難事王解髻中明珠與之如來亦爾為諸法王以大慈悲如法化世見一切人受諸苦惱欲求解脫與諸魔戰為是眾生說種種法以大方便說此諸經既知眾生得其力已末後乃為說是法華如王解髻明珠賜之此經為尊眾經中上我當守護不妄開示今正是時為汝等說言圓中圓者向前三時中圓義與法華之圓無二無別若彼兼但對帶之麤華嚴兼別說圓鹿苑但說三藏方等對半說滿般若帶通別二正說圓教須待法華開會廢了方始稱妙當知麤轉成妙功由法華故云圓中圓妙中妙也言王中王者妙樂記云在昔未會如一國內二三小王各治蒼品未歸大國若會已後同霔一化民無二主國無二王今乃廢諸小王唯立一王故方便教主王名不無言醍醐者玄義云牛譬於佛乳譬華嚴酪譬三藏生酥譬方等熟酥譬般若醍醐譬法華涅槃也言病之良藥者經云此經則為閻浮提人病之良藥若人有病得聞此經病則消滅不老不死文句釋云不老是樂不死是常謂聞此經者得常樂之解坦然在懷無所畏忌言隨喜者經云若有人聞是經隨喜已從法會出至於餘處若城邑巷陌聚落田里如其所聞隨力演說餘人聞已亦隨喜轉教如是展轉至第五十其第五十人隨喜功德無量無邊筭數譬喻所不能及若四百萬億阿僧祇世界六趣眾生有人求福隨其所欲娛樂之具皆給與之一一眾生與滿閻浮提七寶及寶所成宮殿樓閣等如是布施滿八十年已又宣布法化一時皆得須陀洹道乃至阿羅漢道是人功德比第五十人聞法華經一偈隨喜功德百千萬億分不及其一天台智者聖師廣演校量云滿閻浮提人福不及西瞿耶尼一人福滿瞿耶尼人福不及東弗婆提一人福滿三天下人福不及北單越一人福滿四天下人福不及一四天王福四天不及一帝釋福乃至六天福不及一梵福梵福不及小聖福小聖不及體聖福體聖不及小薩埵福小薩埵福不及大薩埵福大薩埵不及此第五十人聞法華經隨喜功德何以故彼非佛法故非實故非圓故雖住後果而不及我初心其義如此且此第五十人初但有一念理解慶己慶他未有事行恩不及人所獲功德為若此也故云好堅木名處地芽已百圍頻伽鳥名在殻聲勝眾鳥何況最初於會中聞而隨喜者又經云億億萬劫至不可議時乃得聞是法華經假使劫燒擔負乾草入中不燒亦未為難我滅度後於惡世中暫讀此經是則為難此經難持若暫持者如是之人諸佛所歎是名持戒行頭陀者云云化緣既云畢涅槃時已至末後壬申歲二月十五日即趣拘尸城娑羅雙樹間叮嚀誨眾云我今常入滅諸有所疑者應當來問耳承勑𥪰諮問一一隨決答一切天人眾爭陳最後供餘皆默不許唯受純陀供涅槃經云世尊於二月十五日晨朝放光照大千界乃至十方六趣眾生遇光滅罪又有五十四眾一時雲集同聲唱言苦哉苦哉如何一旦慧日滅沒爾時一切天王人王爭設供養皆不許之唯受長者純陀之供經律異相云佛臨入滅有長者名曰純陀泣告世尊我等從今無主無救貧窮孤困欲從如來求將來食惟願哀受我等微供然後涅槃佛言我今為汝斷除貧窮以無上法雨雨汝身田令生法芽令汝具足檀波羅蜜是時人天皆來奉供佛悉不受大眾唱言奇哉純陀成就大福我等供具則為唐捐世尊欲滿眾望一一毛孔化無量佛一一諸佛各有無量諸比丘僧悉皆受供釋迦如來自受純陀所奉之供佛慮末代眾於法起斷見夭傷其慧命亦亡失法身更設三種權以扶一圓實一切有佛性一切法常任屠兒廣額者立地頓成佛五逆阿闍王罪滅而妙證是知涅槃法罪福本平等若欲疾成佛應須學此法涅槃經義者已如前示此不煩錄言廣額屠兒者聞一切物皆有佛性之言放却屠刀立地成佛又阿闍世王聞調達語殺父瓶沙心即勞熱滿身生瘡天下諸毉無能治者有一大醫名曰耆婆即白王言欲治此病莫如投佛王即依言俱詣佛所聞罪性空發菩提心身瘡便愈云云如來出世五時說法次第如是夫諸佛如來隨順群機說種種法然不出四門謂一者有門二者空門三者亦有亦空門四者非有非空門為化有者說空門乃至為化著亦有亦空者說非有非空門也是以佛無定說法亦無定但逐機宜說示耳嗚呼今者去聖既遠時當鬪諍牢固眾生執心膠固𥪰爭人我不本如來方便大義於一源法分派互諍以至相殘痛哉痛哉今不肖也依祖說出一譬統論諸教以息眾諍譬如大海潛流四洲天下無所不至故於平地或高原上乃至山頂鑿之得水或遇石縫迸出為泉眾泉合成一川眾川合成一河眾河流入大海同為一味是謂還源反本彼諸水等各有其名曰某泉曰某川曰某河然其源則祇一海也如是眾水一歸於海豈有大小深淺之別名乎法門亦爾如來始成正覺初說華嚴而有小機如䏊無益於是興悲為引此類且設方便示說阿含次說方等次說般若次說法華涅槃如是等法其名雖異義則是一何者最後靈山開權顯實令一切法融為一味平等無差故經云諸法實相世間相常是知千差萬別無非妙法是則據華嚴則一切無非華嚴據法華則一切無非法華據般若方等悉亦咸然噫或人未了如斯之義假華嚴者曰是為根本餘皆枝末翫法華者云此則為王餘是臣民執餘經論者皆云如是是己非他自惑惑人惑之甚矣若准大乘宗旨則應離局執融通無礙若存此執焉為大乘行人乎且如古往諸大宗師如斯之義非不知也在弘法邊強搆是非抑揚彼此此乃大權菩薩化他之方便也況如來大聖一大藏中處處皆云此經第一但為流通故爾又有尚禪者曰禪是教外別傳以為勝法非毀經教此等不知教中專示心要故有是惑焉蓋早不看經之過也何所怪哉且夫我佛如來廣說諸教非他但是為顯真理故也如經云毗盧妙體遍一切處一切諸法無非佛法是以非離文字別有真理若離文求理如雜器求金若言理絕文字是名三藏學者若觀文理不二方曰大乘行人故我天台智者大師於法華玄義中釋經之一字皆用六塵為經如一黑墨色詮無量教無量行無量理若知字非字非字非非字無二邊倒名淨淨則無業名我我則無苦名樂無苦則無生死名常何以故字是俗諦非字是真諦非字非非字是一實諦一諦即三諦三諦即一諦如此解字手不執卷常讀是經口無言音遍誦眾典佛不出世恒開梵音心不思惟普照法界當知黑字是諸法本青黃赤白亦如是也此則以色為經聲香味觸法亦復如是又觀心誦經法云何者是經為經卷是為標軸是誦者為當心念是口念是為齦齶和合而出為有我身為無我身誰是念者推尋畢竟無有我能念者雖無所念之經而有經卷紙墨文字雖無能念之人而有我身雖非內外不離內外雖非經卷不離經卷雖非心口不出心口從始至終必無差謬是名不思議微妙三觀三世諸佛莫不皆從此觀而生苟能了達文文句句皆三德祕藏讀誦熏心則心性所具圓融三諦中熏而發豈得離文而悟理哉已上祖說以此觀之則心之與教應無有二教外別傳那箇心乎若以世尊拈華示之為別傳者此亦不出於教至如達摩謂可師曰將心來與爾安又以血脉觀心等論示之此非教耶況第六祖能禪師聞金剛經而悟道大振宗風那云教外別傳乎且依教而證理者具載傳記其書山積於中或有看一偈而復性者或讀誦而妙悟者或書寫而發慧者或尋行數字而通透者或但頂戴而達真者如是獲益者罔知其數若非心純是教教純是心惡能如是哉夫耆婆執毒皆成妙藥摩男所執無非珍寶有目之人雖為麤行狂言皆不違理是以先德雖有非教之言祇是遣著之方非究竟義不得如我生盲妄信先哲方便之辭反毀本師真實之教冀諸有此惑者改之可也如或不改者吾末如之何佛說是經已一期能事畢法付妙吉祥背東右脇臥安詳入涅槃如薪盡火滅住世七十九設會三百餘應身雖示滅真身本常住如月墮清晝孤光留古躔爾時大地震諸天雨香華一切四部眾失心皆躃地涅槃經云諸善男子自脩其心慎莫放逸我今背痛如常患者汝等文殊為眾說法今以大法付囑於汝乃至迦葉阿難說法既畢背東面西右脇而臥入般涅槃于時大地震動川流盡涸草木摧折幽冥大明天雨香華散大眾上於其眾中或有隨佛入滅者或有失心者或有悶絕躃地者於是依輪王法即以佛身用安棺槨周書異記曰穆王五十二年壬申二月十五日暴風忽起撥屋折木山川覆震天陰雲黑西方有白虹十二道南北通過至夜不滅王問大史扈多曰是何徵耶對曰西方有大聖人滅衰相現耳摩耶下天來唯見金棺泣佛自棺中起說偈以慰之佛滅之時摩耶夫人五衰相現阿那律升天告之下見佛棺及衣鉢杖執之悲泣佛從棺起告言勿哭說偈慰之拘尸城中人移棺欲入城力士十六人而無少動棺自舉昇空出入城四門遶城七帀下大眾交悲喜拘尸城人僉議力士十六人請舉佛棺入城供養盡其神力無少動阿尼樓豆告言縱傾城人亦莫能舉世尊平等福利人天棺乃自舉昇虗空中高七多羅樹從拘尸城西門而入東門而出復南門入從北門出遶城七帀還下本處經于七日渡熈連河天冠寺中大眾即扶佛身出棺置於牀上香水灌洗內以兜羅綿裹外以妙氎如法纏之仍舊入棺滿注香油置栴檀樓上將欲茶毗火悉殄滅大眾疑云如來何緣未畢乃爾乎帝釋云待迦葉故迦葉在他國晚知急急來欲見懇三請乍現雙趺示是時迦葉在波波國見尼乾執天華知佛入滅急詣天冠寺欲見佛身三請不許乃為撥棺現其雙足須臾即隱將欲闍維時三加火輒滅如來三昧火從𮌎出自焚所有設利羅其數不可計天龍及人王爭分各起塔於是力士持炬闍維火即殄滅如是再三終不能燒迦葉告言大聖寶棺三界之火所不能燒何況汝力而能燒耶於是如來𮌎中三昧之火隨聲而發迸出棺外漸漸茶毗經于七日言設利羅者亦云舍利此云身骨茶毗既了靈骨分碎大小如粒具有五色其數無量帝釋得右邊一牙及舍利天上起塔八大國王均分得之各還本國立塔供養尚餘灰炭亦謂灰塔炭塔以永供養後有阿育王分布成金塔數八萬四千遍安一天下八大國王共分舍利阿闍世王得八萬四千以金函盛作百歲燈藏恒河中阿育王經云世尊入城乞食見二童子弄土為戲見佛歡喜以土名奉佛發願使我將來蓋於天地廣設供養以是因緣至佛滅後一百年後作轉輪王名曰阿育統閻浮提因於嫉妬殺八萬四千宮人後於城外造立地獄治諸罪人於是消散比丘化王王即信悟問比丘言殺八萬四千宮人罪可得贖不道人言各為人起一塔下著舍利當得脫罪耳王即尋覓舍利見燈尚明舍利既出燈亦盡滅王怪而問蓮華比丘答云阿闍世王裁量燈油至取舍利乃滅又問道人何處起塔道人即以神力左手掩日光作八萬四千道散照閻浮提所照之處皆可起塔王即依言作八萬四千金銀琉璃頗黎篋盛佛舍利又作八萬四千寶瓶復盛此篋又備無量百千供養之具勑諸鬼神於閻浮提城邑聚落滿一億家者起塔一座今此東土洛陽彭城扶風蜀郡臨淄及高麗地定安金剛山皆有塔焉並有神異又阿育王敬重三寶以閻浮提地並屬三寶是以閻浮提地如芥子許無非三寶地分也尊者大飲光受佛僧伽棃今入雞足山以待彌勒尊飲光梵云迦葉也傳燈錄云佛告迦葉吾有正法眼藏分付於汝汝可流布無令斷絕仍授金縷僧伽棃衣入雞足山其山乃合藏身候彌勒佛下生傳付也彌勒正云梅怛麗此云慈氏以世世修慈故侍者慶喜尊受佛法寶藏與一千羅漢結集流於世慶喜梵云阿難也佛既入滅欲色諸天共詣大迦葉所作禮白言佛日既沒法燈欲滅當以大慈建立佛法福利眾生時大迦葉受諸天請欲集法藏掄選無學千人就七葉巖而阿難結未盡故不聽預會又迦葉以六罪責之一聽女人出家使佛正法減五百歲二佛示脊痛須水不給三佛告以修其神足默然不應四踐佛僧伽棃五示諸女人佛陰藏相六前結未盡爾時阿難聞是語已入金剛定破一切煩惱三明六通具八解脫乃於是夜由門鑰孔入迦葉手摩其頂曰我故為汝令速得道汝無恨耳阿難昇座眾有三疑一疑佛還起坐二疑他方佛至三疑阿難成佛爾時阿難唱言如是我聞三疑頓息於是從初至末四十餘年所說法藏皆悉結集無孑遺者繼有三七聖及餘諸應真造論釋其義轉次廣宣揚飲光慶喜結藏流世既入滅已商那和修等二十一聖相繼弘通利樂群品諸聖事實文煩不錄略標其名及傳燈年數耳一迦葉傳燈四十五年二阿難傳燈三十七年三商那和修傳燈六十二年四優波鞠多傳燈六十五年五提多迦傳燈四十九年六彌遮迦傳燈五十五年七佛䭾難提傳燈五十五年八佛馱蜜多傳燈四十八年九脇尊者傳燈四十五年作大毗婆娑論摧破邪計扶樹正宗更振玄風十富那夜奢傳燈六十年十一馬鳴大士傳燈五十六年造起信論重興正法十二迦毗摩羅傳燈五十八年十三龍樹大士傳燈五十七年初為梵志後信佛教得鼻根淨入大海中齅華嚴經出來流布又說大智度論以釋般若經十四迦那提婆傳燈五十一年十五羅睺羅多傳燈四十八年十六僧伽難提傳燈三十九年十七僧伽耶舍傳燈六十一年十八鳩摩羅䭾傳燈三十四年十九闍夜多傳燈五十二年二十婆須槃頭傳燈四十三年二十一摩那羅傳燈四十八年二十二鶴勒那傳燈四十四年二十三師子尊者傳燈五十年已上諸聖皆受佛勑相繼為祖弘法利生逮乎勒那謂師子預讖曰吾滅五十年後當有難起嬰在汝身至時罽賓國王果滅佛法至尊者前曰師得蘊空不答已得蘊空曰離生死不曰已離生死曰既離生死可施我頭曰身非我有何吝於頭王即揮劒斷尊者首白乳涌高數尺王臂亦墮七日而𣧩此乃佛滅後一千二百八年也此後繼有四聖一名婆舍斯多二名不如蜜多三名般若多羅四名菩提達摩如是四聖雖非佛之所記而相承傳明續佛慧命福利無窮俱是非常人也何以知然昔達摩始至此方梁武帝問志公法師云是何人耶對曰斯乃觀音大士傳佛心印故自西而來又有處云般若多羅尊者大勢至菩薩幻有也云云餘之二聖例可知爾噫達摩九年面壁神光一謁而傳心自此承而續𦦨者不可勝數若非極聖之示迹焉能至於此也如欲委詳歷代諸聖本末及正脉傍傳諸師宗派者請尋傳燈錄釋氏會要云至如來滅後四百年時健䭾羅國迦尼色迦王機務餘暇每習佛經日請一僧入宮說法諸師部執不同王用深疑問脇尊者曰何故爾耶應曰如來去世歲月逾邈師資異論各據聞見王聞斯語甚自感傷乃謂尊者曰願師具釋三藏以決群疑尊者曰然王即宣令廣集聖賢白諸僧曰具三明備六通內窮三藏外達五明者住不在此位者退自餘各還住者五百於是諸聖先造鄔波弟鑰論釋素怛覽藏次造毗奈耶毗婆娑論釋毗奈耶藏後造阿毗達摩毗婆娑論釋阿毗達摩藏凡三百萬頌九百六十萬言備釋三藏莫不窮其枝葉究其淺深大義重明微言再顯廣演流布後進賴焉
