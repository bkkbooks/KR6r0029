body:
  text: 浮庵山人無寄撰集此法行彼土一千餘許載東流至震旦後漢明帝時賫來者是誰摩藤竺法蘭君臣及士庶皆信受奉行因建白馬寺安舍利經像此土諸塔寺由茲始興起破邪論云後漢明帝永平三年歲在庚申上夢金人巨身丈六項有日光飛行殿前欣而悅之詰朝遍問群臣此何神耶通事舍人傅毅曰臣聞天竺有得道者號曰佛也殆將其神乎國子博士王遵曰周書異起云昭王時有聖人出在西方太史蘇由曰一千年後聲教當被於此陛下所夢必當是耶帝信為然即遣中郎蔡諳博士王遵等十八人同往西域求迎佛法往月支國遇迦葉摩藤竺法蘭二梵僧帶白氎𦘕釋迦像及舍利并四十二章經白馬䭾之邀至洛陽乃永平十年也帝大悅翻四十二章經遂立精舍號曰白馬寺以安邀之此土有三寶名自此為始也是時於此方道法廣興布五嶽諸道士六百九十人僉議上疏云莫信胡神說聖上若信此華俗盡歸邪彼我法真僞願須火試之帝即頷其言命集白馬寺爾時道士衆各賫道經來分置於兩壇威儀甚嚴潔舍利與經像別安於道西道衆爇名香繞壇而泣曰我道之興替但在於今日向天陳願志便縱火焚之道經盡為灰梵經完不燒舍利直上空放五色光明映蔽白日光旋環如蓋覆摩藤涌在空廣現諸神變出大梵音聲歎佛功德海又說出家德諸善中第一帝聞大欣悅群疑亦皆息爾時諸大臣尊卑士女等一千三百人一時俱出家彼諸道士衆亦順伏出家永平十四年辛未正月一日五嶽諸山道士朝正之次相命曰天子弃我道法遠求胡教今因朝集可以抗之表曰五嶽十八山觀太山三洞弟子褚善信等死罪上言臣聞大上無形無名無極無上虗無自然大道出於造化之前上古同遵百王不易今陛下道邁羲皇德過堯舜而棄本逐末求教西域所事乃是胡神所說不參華夏願恕臣等罪聽與試驗臣等諸山道士多有徹視遠聽博通經典從元皇已來大上群録大虗符呪無不綜煉達其涯極或策使鬼神或入火不燒或履水不溺或白日升天或隱形不測至於方術藥餌無所不能願得與其比校一則聖上意安二則得辨真僞三則大道有歸四則不亂華俗臣等若有所負任聽元責如其可勝乞除虗妄勑書遣尚書令宋庠引入長樂宮以今月十五日可集白馬寺道士等置三壇開二十四門南嶽道士褚善信華嶽劉正念北嶽桓文度東嶽焦得心中嶽呂慧通霍山天目五臺白鹿等十八山道士祁文信等都合六百九十人各賫靈寶真文大上玉訣三元符等五百九卷置於西壇茅成子許成子老子等二十七子書三百一十五卷置於中壇饌食奠祀百神置於東壇以佛舍利經像置於道西道士等以沉香為炬繞于經而泣曰臣等上啓大極大道元始天尊衆仙百靈今胡亂中夏人主信邪正教失蹤玄風墜緒臣等敢置經壇上以火取驗欲使開示群心得辨真僞縱火焚經經從火化佛經儼存舍利上空放五色光旋環如蓋遍覆大衆摩藤法師涌在空中廣現神變于時天雨寶華又聞天樂感動人情大衆咸悅皆繞法蘭請說法要法師出大梵音歎佛功德亦令大衆稱揚三寶說諸法要止說出家其福最高初立佛寺同梵福量時有司公楊城候劉峻與諸宮人士庶等千餘人出家及五嶽諸山道士呂慧通等六百二十八人出家諸宮嬪御等二百三十人出家道士褚善信氣咽而死其中不順而嚼舌自死者五十餘人於是帝大悅建寺十所七所城外安僧三所城內安尼自漢至於唐貝牒多出來譯之成部袠六千有餘軸西晉時譯經二百六十部造寺一百八十所僧尼三千七百人東晉時譯經二百六十部造寺一千七百六十八所僧尼二萬四千人宋時譯經一百一十部造寺一千九百一十三所僧尼三萬六千人齊時譯經七十二部造寺二千一十所僧尼三萬二千五百人梁時譯經二百三十部造寺二千八百四十六所僧尼八萬二千七百餘人後梁時造寺一百八十所僧尼三千二百人陳時譯經十一部造寺一千二百三十二所僧尼三萬二千人元魏時譯經四十九部造寺三萬八百五十所僧尼二百萬人高齊時譯經一十四部造寺四十三所僧尼闕數周時譯經十六部造寺九百三十一所隋時譯經八十二部造寺三千九百八十五所僧尼二十三萬六千二百人自漢永平至晉永嘉止有四十二寺及後魏都洛造寺一千餘所後趙都鄴造寺八百餘區此等千六國不無譯經建寺僧尼之數而僭僞故不録又唐及五代至大宋金闕録然盛弘佛教莫如唐宋金三朝雖闕其録例上可知矣大藏音義序云釋佛一代經藏始唱轉法輪經洎終談大涅槃經原始要終總一百億部部中卷袟倍蓰難算自金棺匿曜一千年後適有羅漢闓士三藏除饉並世角立二門徒衆互興謗讟相殺其師自是厥後魔外實繁侵損正教於是沙竭大龍尋佛遺囑悉賫經律入安宮中是為海藏也爾後摩滕法蘭等諸德各將西竺龍藏之餘來翻東震歷代弘傳才四千四百餘卷并雜録傳記都計六百三十九函噫斯乃佛日餘輝覺海一滴也如認纖塵為大地指一草作須彌矣又釋氏會要云肇自漢明丁卯之歲終至于唐開元庚午之年現流行世大乘三藏總六百八十六部合二千七百六十二卷小乘三藏總三百三十部合一千七百六十二卷已上都計四千五百七卷歷代諸帝王及與臣僚衆同心大弘闡國泰亦身安其有毀謗者現世便招殃後苦亦應大悔之何所及噫如上所列歷代諸國王公大臣譯經造寺光揚聖化普利群生為若此也若非受佛教勑弘法大士惡能如是哉其有毀而致殃者哀哉爭不止其小惑而嬰大苦於長劫如是等類多載傳記不暇具録今當略引一二示之魏武初敬重佛教每引高僧與共談論廣設佛像種種供養有司徒崔浩不信佛教每與帝言數加誹謗帝以其辨博故頗信之向佛稍薄帝後西征至長安入寺中觀焉沙門聚會飲酒入其空見有財産弓裘及牧守富人所寄藏物帝乃憎之便下詔誅長安沙門焚破佛像勑四方一依長安行事如有容隱沙門皆門誅之又下詔曰昔漢後荒信惑邪僞以亂天常由是政教不行禮義大壞鬼道熾盛視王者之法蔑如也自此已來繼代禍亂天罰極行民死略盡五服之內鞠為丘墟千里蕭條不見人迹皆由於此朕承天緒屬當窮運之弊欲除僞定真復羲農之政蕩滌胡神滅其蹤迹自今已後若有事胡神者及造其形像泥人銅人者門誅皆由漢代劉元真呂伯強之徒接乞胡之誕言用莊老之虗假附而益之皆非真實至使王法廢而不行世有非常之人能行非常之事非朕孰能去此歷代之僞物諸有佛像及胡經者皆擊破焚爇沙門無長幼悉坑之是歲真君七年三月也至十三年二月發癩而殂周武欲毀佛教有沙門名靜藹者年德榮盛道俗所歸聞之曰既為佛之弟子豈可見此湮沒坐此形骸晏然自靜即上表抗之帝雖納其言情決已定故不用聽藹遂入南山石上書偈云願捨此身已速令身自在隨有利益處護法救衆生云云自割身肉布於石上引腸掛樹捧心而卒又宜州沙門道積者次出諫之不用其言遂與同志七人於彌勒像前不食禮懺終七日一時同逝齊承光二年春分帝集沙門詔曰朕受天命寧一區宇世弘三教今並廢之然其儒教文弘政術禮義忠孝於世有宜故須存立且真佛無相遙敬表心而佛經廣歎崇建圖塔壯麗修造致福極多此實無情何能恩惠愚人嚮信傾竭珍財徒有引費故須除蕩凡是經像皆壞滅之父母恩重沙門不敬悖逆之甚並退還家用崇孝治朕意如此諸德如何于時沙門上統等五百餘人並相顧無色俯首流淚而已有慧遠法師遂出對曰真佛無相誠如天旨但耳目生靈賴經聞佛藉像表真今若廢之無以興敬帝曰虗空真佛咸自知之未假經像遠云漢明已前經像未至此土含生何故不知虗空真佛若不借經教自知有法者三皇已前未有文字人應自知五常等法當時之人何為但識其母不知其父同於禽獸帝無所答遠又云若以形像無情辜之無福者國家七廟之像豈是有情而妄相尊事乎帝不答此難乃云佛經外國之法此土不須故廢之耳七廟上代所立朕亦不以為是將同廢之遠云若以外國之法非此土所用者仲尼所說出自魯國秦晉之地亦應不行又以七廟為非將欲廢之則是不尊祖考祖考不尊則昭穆失序然則五經無用前存儒教斯言安在若爾三教同廢將何治國帝曰魯與秦晉封疆乃殊莫非王者一化故不類佛經之難遠云若以秦晉同遵一化經教通行者震旦之與天竺國界雖異莫不同在閻浮四海之內輪王一化何不同遵佛經而今獨廢帝又無答遠云退僧還家崇孝養者孔經亦云立身行道以顯父母即是孝行何必還家帝曰父母恩重交資色養棄親向疏未成至孝遠曰若如來旨陛下左右皆有二親何不放之乃使長役五年不見父母帝曰朕亦依番上下得歸侍養遠曰佛亦聽僧冬夏隨緣修道春秋歸家侍養故目連乞食餉母如來擔棺臨葬此理大通不可獨廢帝乃無答遠因抗聲曰陛下今恃勢力自在破滅三寶是邪見人阿鼻地獄不揀貴賤陛下何得不怖帝悖然作色直視遠曰但令百姓得樂朕亦不辭地獄諸苦遠曰陛下以邪法化人現種苦業當共陛下同趣阿鼻何樂之有帝亦無答但云僧等且還於是毀諸寺廟並賜王公充為第宅退僧三百萬人皆復軍民還歸編戶融刮佛像焚燒經教三寶福財簿録入宮帝未盈一月癘氣內蒸隱雲陽宮尋崩唐冥報記云死天元皇帝即位詔集天下為俗僧尼勑令剪髮留其須前賜王公諸寺宇等皆還取為寺賜諸沙門住持又出入宮三寶財物命造形像各安邀之一皆如舊由是大教復行于世唐冥報記云隋開皇八年京兆杜祈死三日而還云我見閻王王曰汝父作何官答曰臣父在周朝為司命上士王曰若然錯追汝也可速放還又問汝識周帝不曰我甚識之王曰可往看之有吏引至一處門窗椽瓦並用鐵作於鐵窗中見有一人極瘦身作鐵色著鐵枷鎖祈見已泣曰大家何苦如是答曰我信衛元崇言毀於佛教故受斯苦禮曰大家何不注引衛元崇來答曰我尋注之然曹司搜求乃遍三界而云不見若其朝來我暮得脫仍云大隋天子昔與我共食倉庫玉帛亦我儲之卿今若還請以此事聞于天子可為我作大功德救之亦為元崇作福早來相救如其不至解脫無期祈還生具說文帝聞之出勑天下人出一錢用追福焉唐武宗名炎會昌五年用趙歸真劉元正等言大毀佛教詔天下廢寺院其上州各留寺一所上都下都每街留寺兩所各留僧三十人天下所廢寺院錮像委鐵使鑄錢其莫鐵像等鑄為農器金銀像等燒付度支衣冠士庶所有金銀等像勑出後限一月日如違依禁錮法處分其天下所毀大寺四千六百餘所蘭若四萬退僧尼為民二十六萬五百餘人至六年三月帝遇一疾喜怒失常疾既篤甚旬日之間口不能言宰臣請見不許中外莫知安不其月二十三日崩時年三十三宣宗即位改無大中詔所毀寺宇如有宿德名僧復能修創住持遂誅道士劉玄正等十二人於是邪風忽息佛日重光群盲有賴帝德彌高後周世宗榮現德元年乙卯下詔天下寺院非敕額者皆毀之計三萬三百三十六所毀像鑄錢廢僧四萬二千四百四十尼八千七百五十六人帝不久非常而崩且彼魏武唐武及周世宗滅大教已尋得非常之疾不待天年而殂蹟顯傳記而無後世受罪之文然例周武可知又如經云若人犯五罪者於此命終如矛離手墮阿鼻獄受無量苦千萬億劫無有出期何謂五一出佛身血二毀謗正法三破塔壞寺四殺阿闍黎五破和合僧於此五中但犯一者亦墮信斯言也彼諸暗主以熾然惡心壞破塔寺融刮佛像焚燒經典坑諸沙門退僧為民如是具造五逆命𣧩之後不墮阿鼻受大苦惱無有是處嗚呼哀哉又有臣僚謗毀現招殃者非一天台止觀論補注引云周相衛元崇欲滅佛教天和二年上表云唐虞之世無佛圖而國安齊梁有寺舍而祚滅但利民益國即稱佛心夫佛者以大慈為本終不苦役黎民虔恭泥木請造平迎大寺容著四海萬姓不勸立曲見伽藍偏安二乘五典平迎寺者無間道俗罔擇冤親以城隍為塔寺即周帝是如來用郭邑作僧坊私夫妻為聖衆推令德作三綱遵耆年為上座選仁智充執事求勇略作法師是則六合無怨紂之聲八方有歌周之詠飛沉安其巢穴水陸任其長生都上一十五事上表後身生惡瘡遂亡冥報記云傅奕自武德初至貞觀十四年常排毀佛僧其年秋暴卒配入越州地獄中司徒崔浩佐魏武毀滅大教竟具五刑而死墮拔舌地獄珠琳傳云東晉大元十九年道安法師於襄陽西都鑄成丈八無量壽佛像一軀頗有靈感周武滅法時襄州鎮將孫哲志不信法先欲毀此金像邑中士女哀呼盈路哲見道俗歎惜瞋怒彌盛逼嘖侍從速令摧碎先令一百人以繩繫頭挽牽不動謂不用心杖監事者更加一百人牽之不動又加三百人不動如故復加五百牽引方倒聲振地動人皆悚栗哲獨喜踊即令融毀揚聲唱言快事畢還歸才可百步忽然落馬失音直視四支不舉至夜便卒衆咸悅吏部侍郎韓愈諫佛骨疏云佛如有靈能成禍福者凡有殃咎宜加臣身以此奏聞上怒甚將抵以死給事中崔植洎諸諫官皆上疏論救自亦悔責乞罪乃賜寬容免死而遠逐潮州如是等類罔知其數法住於世間一萬二千年正像各千歲末法一萬年中分五牢固各歷五百年機根漸變移法亦隨減滅第一解脫牢此時人根利會正取道易與佛世無異二名禪定牢人根稍微劣久久習禪那乃得三達智三曰多聞牢情識漸愚鈍雖得多聞法慧擇未能明四稱塔寺牢人爭起佛廟處處設道場修證者萬一五為鬪諍牢但諍論諸法未了深密義憍己愌他宗宣律師曰佛之滅度初千年為正法者謂會正成聖機悟不殊故第二千年為像法者依教修學情識漸鈍會理階攝淨住持微通聖旨然於慧擇未甚修明相似道故名像法第三千年後為末法者初基至萬年定慧道離但弘世戒威儀攝護相等禪蹤而心用浮動全乖正受故並因之為末法也善見婆娑論云正法千年像法亦爾以度女人故正法減五百年若女人能遵八敬如法行道則正法住世還得千年又云佛法住世一萬年初五千年出家修道得三達靈智後五千年出家修道不得三達靈智云云言尼行八敬者一者比丘持大戒比丘尼當從受正法不得輕慢調戲二者比丘持大戒半月已上比丘尼當禮事之無亂新學之意三者比丘比丘尼不得並居同止四者自相檢校若有邪語受而不報聞若不聞見若不見五者自省過惡不得高聲大語現其欲態六者與比丘但問經律之事不得共說世間不急之事七者若犯法律當於半月詣衆懺悔八者比丘尼雖百年持大戒當處新受大戒比丘下坐謙敬作禮若比丘尼盡壽能持此八敬法則正法住世還得千年矣最後五百年亦有修證者自後至萬年多修無一得法華經中普賢菩薩白佛言世尊如來滅後後五百歲濁惡世中若有四衆欲修習是法華經於三七日中應一心精進滿三七日已我當乘六牙白象與無量菩薩現其人前而為說法是人以見我故即得三昧及陀羅尼名為旋陀羅尼百千萬億旋陀羅尼云云是知末後五百年中亦有修證者此五百年即末法之初妙勝定經云佛去世後一百年時十萬人出家九萬人得道二百年時十萬人出家一萬人得道乃至五百年時十萬人出家一人得道云云又月藏經云我末法中億億衆生起行修道未有一得者云云由此觀之末法之中假使多修而少有現證者但是種未來之因而已此時所生人福薄障濃厚多行不善事死當墮惡道雖是依教人其心貪利養曾無一念信法豈染其神譬如師子蟲乃自食其肉法中人亦爾依之還自破七夢經云師子死經多日衆獸猶生怖畏皆不敢近多日之後身中自生其蟲食盡師子肉也如來出世外道歸伏猶如師子遊行無畏衆獸潛伏如來滅後所遺教法猶如師子死後之身多日衆獸怖畏不敢復近喻佛正法一千七百年內外道天魔無能毀壞多日之後師子身中生蟲自食師子肉盡者喻佛滅後一千七百年後佛之弟子破戒惡行自破佛教也又有天魔王作佛弟子形現怪而惑衆毀佛讚魔法佛法迸其心棄之如脫屣魔法順於情從之如渴飲楞嚴經云是十種魔於末世時在我法中出家修道自言已成正遍知覺讚歎淫欲破佛律儀又涅槃經云末世魔屬現比丘羅漢等像混壞正法非毀戒律佛滅七千年人壽止三十從茲到十歲三灾次第起飢劫諸穀滅何處得精味人唯煎骨飲飢羸多滅亡病劫非人盛吐毒如猛焰遇者即殞命尸通一天下刀劫人多恚隨執皆成刃父子互相殘人氏皆略盡瑜伽論云人壽三十歲時有飢儉灾此時人多行惡天龍忿責不降甘雨精妙飲食不可復得唯煎朽骨共為宴會若得一粒稻麥粟稗重若末尼堅藏守護彼諸有情多無氣力蹎僵不起亡沒欲盡如是儉灾經七年七月七日七夜方息人壽二十歲時有疾疫灾是時人民多行不善具諸過故非人吐毒疾疫流行遇輒命𣧩難可救療都不聞有醫藥之名死立略盡如是病灾經七月七日七夜方息人壽十歲時有刀兵灾爾時有情以業力故父子兄弟互相不知各起猛利殺害之心隨執草木瓦石皆成鋒刃更相殘害如是刀灾經七日七夜方息無灾過後此閻浮中存萬餘人云云婆娑論云有能一日一夜持不殺戒不逢刀兵劫若以一阿梨勒果奉施僧衆不逢疾疫劫若以一摶食施諸有情不逢飢饉劫云云今釋尊出世當人壽百歲時自入滅已來至今大元天曆戊辰之年二千二百七十七年矣更歷四千七百二十三年人壽止三十也所以然者過百年減一歲過千年滅十歲故經像雖存世無一崇奉者比丘行俗行聖賢亦不興爾時像自頺經盡歸龍宮唯有彌陀法百年留世間導諸有緣衆盡生極樂國是知彌陀佛悲願最深切正像法時人心純質故多有聖賢化作凡形和光同塵彌法利生至於末法之末人多諂諛背正向邪無受化者是以聖賢隱而不現婆娑論云佛滅一萬年後像自頺落經歸龍宮諸比丘衆同於俗流但袈裟剃髮而已又無量壽經云末世法滅流入龍宮特留此經百年在世接引衆生往生彼國已上略示一代起盡大綱此下粗述勸誡之意咄我等衆生無始業障濃晚生濁惡世聞法不生信雖然亦可快幸及未墜時人身固難得作男子亦難出家最甚難聞法難復難如今獲四難此誠非小緣言人身難得者如經云如人乘舟入於大海失針於中覔之不得後復行舟忽得其針得人身難復甚於此言丈夫難得者經云不可以少善根福德因緣得男子身故我釋尊行菩薩道時值七萬五十佛常修梵行乃離女身又如此方善妙尼欲離女形二十七生每捨其身布施衆生乃至供養三寶逮最後生猶未捨女身而證初果由是觀之丈夫難得何所疑哉言出家難得者衆生多劫輪回六趣備受諸苦良由無始貪愛所縛貪愛之本乃是妻子若無妻子煩惱則除可易出世矣昔齊高氏見負炭兵形容憔悴憫其辛苦勸令出家唯有一人樂去齊王歎曰人皆有恩愛眷屬故未能脫去也且如早出家者尚退還為俗業者多矣出家為難理可知也言聞法難者經云如一眼龜潛於海底過一百年涌出水面意值浮木欲轉其報而木西浮龜或東出南浮北出如是相差未適遇則復沉海底又過百年出海亦爾如是展轉至無數劫聞佛法難倍過於彼噫如上所引四難則難中之難而今我等既獲免之踵乎釋門實為萬幸宜各發勇猛心護浮囊越大海登彼岸莫作寶山空手之悔爾勸諸新學輩應生欣慶心又念無常身猶如石火光井枯魚少水象逼鼠侵藤念念命隨減嚊吸安容保時時慎三業莫與惡相交歸依三寶戒五戒與八戒十重六八輕乃至八萬戒雖未具堅持但可日誦念出曜經云是日已過命則減少如少水魚斯有何樂云云井譬人身水譬日魚猶人命枯與少譬無常也又賓度盧為優陀迎王說法經云昔日有人行在曠野逢大惡象狂懼無依見一丘井即尋樹根入藏井上有上白黑二鼠牙齧樹根此井四邊有四毒蛇欲螫其人而此井下有三毒龍旁畏四蛇下畏三龍所攀之樹其根搖動其上有蜜三兩之滴墮其口中于時樹動敲壞蜂窠衆蜂飛散咂螫其人野火復起來燒其樹大王當知彼人苦惱不可稱計得味甚少苦患甚多野喻生死人喻凡夫象喻無常井喻人身根喻人命白黑二鼠喻於晝夜齧樹根者喻念念減四蛇喻四大蜜喻五欲蜂喻惡覺火喻老邁三龍喻三惡道言三業者身口意也一切罪善無非三業所造謂身殺盜淫口妄綺兩惡意貪瞋癡也縱三業則十惡慎三業則十善惡則三塗苦報善則人天樂報亦是出世成佛之因言三歸者歸依十方三世一切常住佛法僧三寶也三寶有三種謂同體別體住持等也同體者謂於一真如上說為三也一者真如是覺性名佛寶二者真如有軌持義名法寶三者真如有和合義名僧寶別體者小乘則說丈六金身是佛寶四諦十二因緣生空是法寶四果緣覺是僧寶大乘則說三身如來是佛寶二空教是法寶三賢十聖是僧寶住持者金木塑𦘕是佛寶三藏文句是法寶剃髮染衣是僧寶然其本是一若凡夫發心歸依者無如別體三寶何謂若歸佛時應念法報應三身一體無別是大慈父能拔衆見一切苦惱與無量樂歸法時應念經律論三藏大小無差是好良藥能療衆生三惑之病證涅槃樂歸僧時應念聖賢凡三類高下無間是大福田能去衆生貧窮困苦與諸福樂言聖賢凡者若大乘則自等覺降初地名聖向行住名賢十信及五品名凡若小乘則支佛及四果為聖七方便為賢亦名為凡也大方便經云三寶為所歸者以救護為義譬如有人有罪於王投向異國以求救護異國王言汝來無畏莫出我境莫違我教必相救護若誠心三寶更無異向不違佛教魔王邪惡無如之何又折伏羅漢經云昔忉利天子壽命垂盡五衰相現觀壽終後墮猪胎中愁悶不樂有天告之佛能脫卿之罪即到佛所作禮未問佛告天子一切萬物皆歸無常汝素所知何得憂愁天具白佛佛言欲離豚身當誦三歸即從佛教晨夜自歸七日壽盡下生維耶離國作長者子在母胞胎日三自歸始生墮地亦跪自歸舉家深怪謂之熒惑意欲殺之唯父有識曰此兒者非凡流也世人百歲尚未曉自歸三尊況初墮地而能稱南無佛耶好視養之兒年七歲告父母曰我欲供養佛僧父母異而諾之營辦供具佛及衆僧來應兒供而為說法兒及父母皆得阿惟越致云云言五戒者一不殺二不盜三不邪淫四不妄語五不飲酒也言八戒者前五如上更加三謂一過中不食二不著華鬘瓔珞不坐高廣大牀三不自作歌舞伎樂故往觀聽也言十重者一殺二盜三不淨四妄語五酤酒六說他過七自讚八貪九恚十謗三寶也言四十八輕者一見和尚阿闍梨乃至同行應起迎禮如法供養二不得故飲酒亦教人飲三不得食一切肉四不食五辛五見犯戒者教令懺悔六見大乘法師自遠方來迎請供養三時說法七有講法處悉往聽受八見諸病人常應供養如佛無異九不得心背大乘受持二乘十不得畜刀杖弓箭等鬪戰殺生之具如是十戒應當學復次一不得為利故入軍陳中往來二不得販賣良人奴婢六畜市易棺材盛尸之器三不得謗他善人乃至國王大臣言犯逆重四不得放火焚燒山澤五佛弟子乃至一切怨親應教受持大乘經律令發菩提心六先學大乘見新學菩薩來求經律應如法說七不得親近國王大臣恃作威勢橫取錢物八日夜六時受菩薩戒若不能解戒律因緣不得為人作師授戒九見持戒比丘不得欺謗十常行放生見殺生人方便救護若父母兄弟死亡之日應請法師講菩薩戒經福資亡者如是十戒應當學復次一若人殺我父母兄弟不得加報二不得自恃聰明豪富而不咨受先學法師經律三自解經律有新學菩薩來問不得以輕慢惡心而不好答四不得置佛經律反學邪見外道俗典障道因緣五為說法主乃至僧坊主善守三寶物莫無度用六先在僧坊中住乃至大衆中住有客菩薩比丘來應起迎來送去種種供養又若檀越來諸衆僧僧坊主應先差送客僧七不得受別請利養入己八若請僧求願之時當次第請不得別請九不得為利故販賣男女色自手作食自磨自舂占相吉凶一切呪術工巧等十不得為白衣通致男女交會之事如是十戒應當學復次一若見外道一切惡人賣佛菩薩形像及賣經律當教化取物贖之二不得以輕稱小㪷誑人取物又不得長養猫狸猪狗三不得觀男女等鬪及軍陳兵將等鬪亦不得聽琴瑟箜篌技樂之聲又不得樗捕圍棊六博等戲乃至爪鏡楊枝而作卜筮諸惡技術四護持禁戒日夜六時讀誦是戒猶如金剛如護浮囊自知我是未成之佛五孝順父母師僧三寶又願得好師善友教我大乘使我開解如法修行念念不去心六持佛禁戒作是願言寧以此身投熾然猛火大坑刀山終不毀犯諸佛經律與諸女人作不淨行寧以鐵綱千重周匝纏身終不以破戒之身受信心檀越一切衣服寧吞熱鐵經百千劫終不以破戒之口受信心檀越百味飲食乃至願一切衆生悉得成佛七常應春秋頭陀冬夏坐禪楊枝澡豆三衣瓶鉢坐具錫杖香爐漉水囊手巾刀子火鐆鑷子繩牀經律佛像菩薩像此十八物常隨其身若頭陀坐禪時莫入難處謂惡王土地草木深邃師子虎狼水火風難劫賊毒蛇等八應如法次第坐不問老少貴賤先受戒者前坐後受戒者後坐九常應教化一切衆生建立僧坊佛塔一切行道之處又若疾病國難賊難父母兄弟死亡之日一切齊會乃至水火難羅剎難杻械枷鎖繫縛其身多淫多瞋多癡皆應讀誦說此經律如是九戒應當學復次一與人授戒時不得揀擇一切國王大臣比丘比丘尼信男信女淫男淫女無根二根乃至一切鬼畜但解法師語者盡得受戒唯除七遮七逆者又出家者不得禮拜國王父母六親二不得為名聞利養故詐現解一切經律故與人授戒三不得於未受菩薩戒者前外道邪見人前說此大戒唯除國王四若受正戒故毀犯者不得受檀越供養亦不得行國王土地飲國王水何者此人法中大賊畜生無異木頭無異故五受持大乘經律剝皮刺血折骨書寫乃至木皮紙絹竹帛亦得常以七寶香華如法供養六見一切衆生唱言汝等盡應受三歸十戒乃至見牛馬猪羊一切畜生心念口言汝是畜生發菩提心七常行教化入檀越家不得立為白衣說法應置高座上坐說法諸人下坐聽受八不得故作破法者不聽我四部弟子出家行道亦不聽造建形像佛塔經律九不得為名聞故於國王百官前說佛法戒橫與犯戒者作繫縛事若聞外道惡人誹謗佛戒如以三百矛㓨心寧自入地獄百劫不聞一惡言破佛戒之聲如是九戒應當學云云已上十重及四十八輕出梵網經又有菩薩四百戒苾芻二百五十戒比丘尼五百戒三千威儀戒八萬細行戒如是衆戒三聚為總所謂一者攝律儀戒謂惡無不離二者攝善法戒謂善無不積三者攝衆生戒謂生無不度也此等諸戒初心凡夫難可具持況今持戒堅固已過七百八十有餘年矣以故時濁根劣障濃信薄持戒勢難雖未具持但誦亦可抑又唯持三歸五戒盡壽不破則大佳不然七日乃至一日亦得何者如觀無量壽經云若一日一夜持沙彌戒命終即往極樂世界中品中生又如上所引忉利天子七日誦三自歸轉劣獲勝故也所言戒者禁也勒也謂禁情欲如猴帶鎖勒身口如馬著轡智度論云大惡病中戒為良藥大怖畏中戒為守護死暗冥中戒為明燈三惡道中戒為橋梁五怖海中戒為大船又華嚴經云如人欲成家宅先整其基菩薩亦爾欲修萬行先淨尸羅薩波多論云初受戒人與佛齊等有經云受戒之人於六道中隨所生處皆輒為王又云坐受立破猶勝不受是以戒之功德不可具陳廣如梵網楞嚴等經及諸毗奈耶中說若欲委知請尋詳之布施及安忍精進修禪智讀誦書經論禮念佛菩薩或修營佛廟或造建僧坊或塑𦘕聖形或修古經像或歌詠三寶或掃塔獻華或燒香然燈或作樂供養或奉養師親或行世仁義或敬老慈幼或悲諸有情或隨喜他善或謙心軟語隨宜但行一亦當成佛道言布施者梵云檀有三種謂身命財法也所言身命施者頭目手足除得忍菩薩餘所不能故身子至第六心而退也言財施者奴婢象馬及諸珍寶等此則不在多少但隨分盡情耳故貪女施兩錢現作王妃老母施臭米汁即生天上有云捨身猶屬財施言法施者若從諸佛及善知識聞說世間出世間善法若從經論中聞以清淨心為人演說皆名法施若以財施比法施則千萬億分不及其一故金剛經云若人一日三捨恆河沙等身布施如是經無量劫以身布施若人持此經乃至一句為人演說其福勝彼言安忍者梵云羼提謂內心能安忍外所辱境也忍有二種謂生與法生謂外人瞋罵打害等法是寒熱風雨飢渴老病等於此二境心安不動如富樓那修思若有來罵者喜不加拳若遇拳之者喜不加杖未若遇杖之者喜不加刀刃若遇刀害者自念我欲早離五陰毒身賴有善友斷我苦本可不珍重如是操心則非但斷怨福智彌高矣故永嘉云觀惡言是功德此則成吾善知識云云言精進者梵云毗離耶謂勤行善法不自放逸也精進有二種一身二心謂塑𦘕聖容書寫經典禮誦講說修諸善法無有休息是為身精進勤行善道禪定智慧心心相續無有間斷是為心精進也由此毗離一度力故五度方圓矣如釋尊行因之時七日翹足功超彌勒良由於此故經云未有一法從懈怠中生云云言禪者梵語具云禪那此云思惟修禪有二種謂世與出世言世間禪者謂根本四禪四無量心四無色定即是凡夫所行禪也出世間禪者謂六妙門十六特勝通明乃至三明六通此則二乘共禪如首楞嚴等百八三昧諸佛不動等百二十三昧是則諸佛菩薩所修禪也不與凡夫二乘共也夫禪之所以為功用者靜諸雜慮制心一處見性成佛爾三世諸佛一切菩薩莫不皆從此門而入故先德云縱經萬歲修諸散善不如一食頃安心靜慮云云抑若論其邪正及修觀方便者似乎文煩故不録示若要詳之請覽天台摩訶止觀論於中廣說禪門修行之相揀邪正曉偏圓坦然明白如指諸掌言智慧者梵云般若謂照了一切諸法皆不可得而能通達一切無礙智慧有三一者求聲聞智謂從初四念處因觀四諦乃至證無生智二者求緣覺智謂觀十二因緣覺悟無生三者求佛道智謂菩薩從初發心已來勤行六度破魔斷結終成正覺乃至入於無餘涅槃若菩薩以清淨心修此三種智慧故名為般若金剛經云一切諸佛及諸佛阿耨菩提法皆從此經出故云般若為諸佛之母又此般若生佛共有但由迷悟且分高下苟知斯理而研心則即顯本有平等大慧是則寧有生佛之異乎故淨名云平等真法界佛不度衆生有云若菩薩不聞般若則去佛道遠雖在凡夫學般若者則得名為來成之佛夫菩薩萬行不出六度於此六度般若為總苟修般若已具行於六度萬行佛言若說六度功德因緣窮劫不盡云云言讀誦經論者一代教中有經律論三藏於中亦有大乘小乘顯教密教也佛境本無二三大小差別隨順群機故茲爾耳且如來出世大意欲令衆生皆入大乘而有小機不能預大為此自說三乘使得小益漸引入大故法華經云入大乘為本以故說是經惟諸行者當知此義在經若論莫揀大小隨其所堪皆應受持嗚呼今之學大乘者但見般若方等部內融通之語及與歎大斥小之文未深如來逗機設教微密之旨竪大慢幢非訶小乘稍似不通何者方等部內歎大斥小者諸二乘人取小為足不能回轉如來將欲令其耻小故斥之令其慕大故次之令其入大故次說般若融通淘汰如是節節點檢警䇿引入一乘當知彈斥但被當機非關後世初心凡夫若此小法無益於物佛滅度後迦葉阿難經集之次何不遺捨而收集之合置一藏耶抑如佛世當機尚有利鈍利者頓入於大鈍則由小入大由是之故教存大小況今末代稟教行人寧無優劣是以優其樂大劣則從小各有所宜理無防礙何用非之且小乘之所以為過者但著小忘大而已苟回心而向大則何過之有如長者誨兒以半字必有由也果如彼之所訶行不由往直行大道莫幸如也然若普天之民純是君子誠可爾也若雜野人豈其然乎何者若使野人行於大道猶驅麋鹿遊於城市故也由是機教相差益安在乎或復有人引經云唯誦不解則為謗法如役虗碓竟無所益如此局說何足為信夫人有愚智智人取義愚者守文雖是智人苟不用心推求未能達於深理謂但誦文亦勝故懶尋其玄義是以如來別誡此人故曰云云非是通誡癡冥之者如此癡人尚不能知丁一之字況云曉了玄微之趣是人難教回心向道雖回向道讀誦亦難是以但誦亦自為善大聖必喜寧加歎美奚敢責之令其失意若通誡者是人於法永無緣分長流惡趣無有出期然則孰謂如來是正遍知興平等慈以大方便普導群盲者也此等癡人亦有可責之時謂雖未了其義若讀誦熏心月積年深則功熟意通妄謂發真即生取著滯而不轉應當此節方可警之勸令進趣不可非時責之誡之令生退屈是人現世功雖未成善萌已作必漸滋長後世應為聰慧之人今之智者亦應夙世唯誦愚人此語非從臆說布在經論可見若以不解為罪者如陀羅尼義不可識何但誦而罪滅福生耶又傳記中有尋行數字而發慧者至於雉子粗聞而轉為法師蚖蛇蚌蛤蒙熏而脫報如是之類亦能曉其旨趣乎凡修道者當知此意莫論教之大小人之貴賤若男若女在家出家若老若幼若智若愚若解不解若精未精若多若少若長若短但隨分讀誦則功不唐捐矣功成早晚由人勤怠耳又復為人師者若不隨懷樂而噵之則奚以異於將其方本逗圓孔耶是謂盲跛師徒二俱墮落也讀誦自利也解說書寫利他也二利兼修乃名菩薩又五種行中解說書寫功德無勝學者知之言念佛菩薩者十方三世諸佛菩薩其數無量名亦不同若總念者境寬心散三昧難成應隨有緣一佛一菩薩專心禮念則感應易成即見真身聞法悟道普見十方無量諸佛一切菩薩海會圍繞若於現世未得親覩後世隨意必生其處親承供養矣故淨土論云一佛功德與一切佛功德無異以同一法性故是以念一佛時即是念一切佛也云云云何得知有緣者謂若從善友聞若從經中見隨所見聞即附信心者是大抵衆生多障故修諸道業而中廢頗多唯念佛者萬不漏一譬如世間薄德之人借王力則在在所往無𣣋犯者所須無乏身心無畏念佛者亦爾由佛攝故天魔外道不能惱亂障滅智增世世所生常在佛前故五停心法云多障衆生修念佛觀又經云靜心念佛五體投地則成天業散心稱念低頭舉手則成人業自是不復墮三惡道常生人天受勝妙樂最後遇佛證得妙果言修營佛廟造建僧坊者安佛舍利及聖形像之所謂之佛廟衆僧經行坐臥之處謂之僧坊若人敬重三寶若新造立若修故所獲功德不可限量毗波沙論云比丘經營精舍有五事一為報佛恩故二長養佛法故三為滅凡劣衆自貴高故四為將來弟子折伏憍豪故五為發起將來福業故賢愚經云須達長者最少女子端正無比為國王婦後乃懷妊生卵一枚尋即開敷生十男子形㒵端正勇壯非凡長者異之將詣佛所佛為說法母及十子證阿羅漢阿難問彼宿因佛告阿難過去毗波尸佛滅後分而舍利起無量塔中有一塔將欲崩壞有一老母而修治之有十年少因行遇見即共修治從是已來不隨惡道天上人中恆與俱生受福快樂今遭我故出家得道又百緣經云過去維衛佛滅後末法之中有一人行見佛塔小有破落和泥補之并買金薄而以塗之從是已後不墮惡道天上人中身常金色最後生於迦羅衛城一長者家身亦金色世所希有身光所照皆作金色年漸長大求佛出家得阿羅漢又法句喻經云佛在世時有一羅漢持佛髮爪至罽賓國南山中起塔常有五百羅漢晨夕繞禮于時山中有五百彌猴見僧繞塔即共負石學僧作塔繞之禮拜時因天雨山川暴張衆猿一時沒水而死生忉利天尋詣佛所聞佛說法五百天子一時皆得須陀洹道云云且此所引一二之緣乃是少分結緣之者如此微緣感報尚爾奚況始發善心全辦經營者乎又彼衆猿學僧戲作轉報證道尤可悚然況復為人誠心施作所獲功德曷勝言哉言塑𦘕聖形者夫真佛無形而假立形像歸依求願似如顛倒然取相凡夫不可向空興敬故須借像表真如祈雨者作草龍而禱之則真龍降霔建假像而敬之則真佛垂應安用以真假為分別乎如優陀迎王經說世尊升忉利天優陀迎王心懷渴仰雕栴檀造其像而供養之世尊降來像起出門祇迎真身讓云我當不久入滅像自久住於世福利一切吾敢及仁像即果其言而先入門佛因為說造像功德乃云若人造佛形像功德無量世世所生不墮惡道常生人天受福快樂身恆金色眼目清淨面㒵端正諸相具足若生人中常生帝王大臣長者賢善之家豪尊富貴若作帝王王中特尊若作輪王王四天下若生天上天中最勝乃至得作六欲天王於六天中最為第一若生梵天常為諸梵之所尊敬最後得生無量壽國於諸菩薩亦為第一又云若人臨𣧩語人造像乃至大如麥是人能除八十億劫生死之罪又有經云修故勝於新成云云是以昔有貧女補小缺面世世面為金色富樂自在於末後生遇佛證果又有長者治一破指生生指放燈光尸寶常隨無所乏短終值於佛出家得道噫如是所作甚小而獲益之大者蓋投種於無上良田之然也古所云春種一粒穀秋收萬顆子斯之謂歟言歌詠三寶者經云娑婆衆生耳根利故以音聲為佛事是以歌詠之時非但自心益生虔敬亦令幽顯一切視聽生歡喜心增發道意自他兼利功莫大也言掃塔功德者菩薩本行經云過去定光佛滅後正法末時有一貧人賣薪自濟向澤採薪遙見澤中有一塔寺即至其所瞻覩作禮唯見鳥獸止宿之處草木荊棘不淨滿中絶無人迹無供養者貧人見之心用愴然而不曉知如來神德但以歡喜誅伐草木掃除不淨作禮而去以是因緣命𣧩之後生光音天受樂無量盡其天壽而復百反作轉輪王王四天下輪王福盡常為國王大姓長者財富無量容貌端正見者愛敬若欲行時道路自淨虗空之中雨散衆華如是受報經九十劫最後身值釋迦如來出家得道今婆多竭利尊者是又阿含經云若人掃滿閻浮提地不如掃佛塔一牛臥地有云命𣧩直往安樂世界云云言獻華功德者百緣經云過去維衛佛遺法之中有一人行到塔上見有萎華塵土污坌即取拂塵還用供養以是因緣九十一劫不墮惡道常生人天身體柔軟顏色鮮澤財富無量有大威德終值釋尊出家得道今威德比丘是拂塵古華而供養者所感若斯何況特造而供者其福莫論言燒香功德者百緣經云過去毗婆尸佛滅後遺法之中有一人入佛塔中以栴檀香燒之供佛舍利以是因緣九十一劫生人天中容貌端正身諸毛孔出栴檀香終乃值佛得阿羅漢果今栴檀香比丘是言然燈功德者賢愚經云舍衛國中有一女人名曰難陀貧窮孤獨乞丐自活見諸國王大臣爭供養佛心自念言我宿何罪生處貧賤雖遭福田無有種子後報可知感傷自博尋欲設供竟日乞求唯得二錢持詣油家將用買油足成一燈持向祇桓佛前然之因發誓願今我來世得智慧燈滅一切暗作是願已禮佛而去以重心故於衆燈中明好獨朗至曉天明目連當欲滅之盡力不能佛見語言此是發大心人所施之燈非汝聲聞所能傾動正使汝注四大海水及以毗嵐猛風亦不能滅至曉難陀來詣佛所佛與授記汝於來世過二阿僧祇劫當得作佛號燈光王十號具足難陀歡喜出家為尼為衆所仰又譬喻經云阿那律尊者過去身為劫賊入佛塔中欲盜物時塔中像前然燈欲滅以箭正明見像嚴麗毛竪自念他人尚能捨物求福我云何盜便捨而去以此九十一劫恆生善處漸捨諸惡福祐日增終得值佛出家證果天眼第一能見三千大千世界如觀掌中菴摩勒果大論云但施燈燭生六天中身常光明言作樂供養者百緣經云迦毗衛城中有一長者其家巨富財寶無量其婦懷妊十月滿足生一肉端謂為非祥便往問佛佛語長者但好養育長者聞已歡喜而退到七日頭肉端開敷有百童子端正殊妙年漸長大兄弟百人投佛出家一時俱得阿羅漢果大衆見已問佛宿因佛言過去毗婆尸佛滅後有王起塔安佛舍利而供養之時有同邑一百餘人作諸伎樂供養彼塔以此因緣九十一劫得生人天受福快樂今值於我出家證果言奉養師親者世間深恩無過父母出世大恩莫先師長故佛言無佛世時孝父母則等供佛福又墮藍本經略要云若人為求福常行於布施金鉢盛銀粟銀鉢盛金粟金鼎具百味寶牀敷臥具象馬及車乘衆寶以莊嚴如是等物數各八萬四千以用布施人所獲福無量不如以一食施一求道人百求道人不如一初果百初果人不如一二果百二果人不如一三果百三果人不如一四果百四果人不如孝父母又彌勒菩薩勸孝偈云堂上有佛二尊懊惱世人未識不用金彩粧成非是檀香雕刻祇看現世爺娘便是釋迦彌勒若能供養得他何用別作功德乃至云在生甘旨無虧死後不須追憶君能如是用心天地龍神佑翼又報恩經云父母者三界最勝福田又毗奈耶云佛聽比丘盡心盡壽供養父母不然則得重罪又云佛聽縱極破戒應供養父母及親教師軌範師病人等又云出家人若供養父母者於三衣外自餘物或從施主乞或從僧得利或僧所常食之分減半供給若常乞食亦與己所滿腹食肉聽取其半濟其父母又不思議光經云若以種種飲食及諸珍寶種種供養非報父母恩若能引噵令向正法乃名報恩又慈悲懺經云師長之恩過於父母何者父母雖愛其子不能令出三界樊籠師長教之以善令離三有趣向菩提故爾傳曰昔有三州之人早失其父者以一無子老人共為父至誠奉孝現感天神之祐五郡之人喪其母者以一無子老婆共為母盡心終孝現蒙國君之賞職噫以他人假為父母而事之其驗也若此奚況於己受生父母承順孝養其福可勝言哉又有抱竹而泣雪裏笋生敲氷而哭水上魚踊此亦孝誠之至也由此觀之師與親不可遺也言行世仁義者夫仁義乃諸善之本三王五帝之道不踰於此孔孟之得聖賢名亦由此而已矣世道稱五常出世法名五戒名異義同故知人王法王之道俱不越仁義也言敬老慈幼者亦仁義而已可以意得謂敬則義慈是仁也故仲尼曰老吾老以及人之老幼吾幼以及人之幼是則天下可運於掌至於內教亦然敬事先德而受教慈育後生而誨進如是相傳不已則普天之民可以為道矣大論云昔有鳥名迦頻闍羅有二親友一者大象二者彌猴共在畢跋羅樹住自相問言我等不知誰應為大象言我昔見此樹在我腹下以此推之我應為大彌猴言我曾蹲地手捉樹頭我應為長鳥言我於畢跋羅林中食此樹果子隨糞出此樹得生我應最大鳥復說言先生宿舊禮應供養即時大象背負彌猴鳥在猴上周遊而行一切禽獸見而問之何以如此答云恭敬長老故也禽獸受化皆行禮敬不侵民田不害物命國人亦效皆行禮敬自古及今化流萬世國土大平云云於戲其在鳥獸敬長遵禮況居人數可得心行縱逸乎外書曰正己而天下正斯之謂歟言悲諸有情者菩薩萬行悲心為始故華嚴經云因於衆生而起大悲因於大悲生菩提心因菩提心成等正覺又墮藍本經云若人百辟支佛不如一佛百佛不如有人作佛塔若復有人但能發心歸命三寶勝上衆善又上所列布施等善不如有人受持五戒持戒不如慈心憫傷衆生蠕動之類諸經雜要云若人捨阿僧祇身供養十方諸佛菩薩聲聞不如有人施畜生一口飲食乃至施與蟻等悲田其福最勝如舍利弗以一上佛佛回施狗而問舍利弗汝以施我我以施狗誰得福多舍利弗言佛施狗得福多又寶積經云妙莊嚴忍世界衆生悉皆具足一切安樂若有衆生於彼國土億百千歲修諸梵行不如此娑婆世界一彈指頃於諸衆生起慈悲心所獲功德倍過於彼又優婆塞戒經云若或田倉多有鼠犯暴穀米但作是念如是鼠因我得活念已歡喜無觸惱想當知是人得無量福云云凡求佛道者應當如是學言隨喜他善者一切衆生無始劫來繫於六趣輪中受無量苦未得解脫者但由嫉妬心強破障他善故也雖或作善欲勝他故人我執心熾然不息遠解脫期若能隨喜他善則滅嫉妬障成柔順忍易免苦輪矣大品經云一毛破為百分滴取大千海水可知其數隨喜之福不可知數又諸經要集云若有貧窮薄福人絶無塵許可施物見他行施心生喜其福與施等無異云云智者應急改往修來耳言謙心者除慢病之妙藥也而此慢心法中大障譬如世間之輪不能到於高山之上法輪亦爾不得轉於我慢高山是故學佛者應先折慢上敬三寶中恭尊長下順凡庸是則可為善人歟是以不輕菩薩常禮一切云不輕汝普賢大士亦云我於一切衆生種種承事種種供養如敬父母如奉師長乃至如來等無有異又近世法華法師道行清灑為衆所敬若行之時但視地而行見有微蟲當路即自念言焉知此佛子先我而得道便避而行學者可不思齊言軟語者悅可衆心之先務者也夫世間之人三業造罪口過為重口四惡中惡言最甚何者非獨自心起嗔亦令對者懷恨因作怨根漸漸增長從劫至劫互相殘害永無了期爭似與人語時當出軟音或教以善令其歡喜乃至於一切畜生不得加其惡言彼雖未了人之所言而怒相現前令彼畜生見而驚怖是以不無罪業業若成則報必不虗而自當之如護口經說昔三藏比丘以一惡言故報為百頭魚殃及其母亦作廁蟲云云又大方便經云人生世間禍從口出甚於猛火猛火止燒世間之財惡口熾然燒七聖財口中之舌鑿身之斧滅身之火可不慎哉如上所示自布施安忍至謙心軟語一一無非成佛之因若具行之則莫善如也不然隨其宜樂但修一事亦得何以故爾法華經偈云若有衆生類值諸過去佛若聞法布施或持戒忍辱精進禪智等若人善軟心如是諸人等皆已成佛道諸佛滅度已供養舍利者起萬億種塔金銀及玻瓈玫瑰琉璃珠清淨廣嚴飾木樒并餘材甎瓦泥土等若於曠野中積土成佛廟乃至童子戲聚沙為佛塔如是諸人等皆已成佛道若人為佛故建立諸形像或以七寶成鍮鉐赤白銅鐵木及與泥或以膠漆布或彩𦘕佛像自作若使人乃童子戲若草木及茟或以指爪甲而𦘕作佛像如是諸人等皆已成佛道若人於塔廟寶像及𦘕像以華香幡蓋敬心而供養若使人作樂擊鼓吹角貝簫笛琴箜篌琵琶鐃銅鈸如是衆妙音盡持以供養或以歡喜心歌唄頌佛德乃至一小音皆已成佛道若人散亂心乃至以一華供養於𦘕像漸見無量佛自成無上道廣度無數衆或有人禮拜或復但合掌乃至舉一手或復小低頭若人散亂心一稱南無佛如是諸人等皆已成佛道云云噫若非一切法無非佛事焉能以兒戲作事散心一稱爾許微功至於極位哉由是之故我釋尊出世興悲憫物以巧智方便隨其根樂或示坐禪或讀誦經或教念佛乃至施戒等一切諸善令其修習入於佛道靡有孑遺除一闡提類如世間醫王隨病與藥除命盡者無不痊平或人未了如來方便教義又未能達衆生宜樂各執一端謂之為勝亦教他人以己所觀之法曰坐禪為最或曰誦經第一有曰念佛為勝乃至施戒等法皆云為是非諸他善此則知一不知其二者歟且如欲入王城八門無防應隨方所引之直入何必以東道之人引入西門西道之人引入東門枉使勞苦門雖是八入則唯一諸法門殊咸歸一處何偏執諍是謂不察病根純教乳藥之類也勸諸行者應知此義隨力所堪從其一事進功無退耳若願生安養隨功生九蓮得見彌陀佛聞法悟無生安養者亦云極樂其國莊嚴及諸樂事不可譬說小彌陀經云從是西方過十萬億佛土有此世界無量壽經云彌陀佛國去此不遠如是二說但隨機說耳遠近不可定也祇在衆生一念心中是心無礙豈有東西遠近乎阿彌陀此云無量光亦云無量壽故經云彼佛光明無量照十萬國彼佛壽命無量無邊阿僧祇劫云云言九蓮者彼佛以四十八願莊嚴淨土設九品蓮接引十方有緣衆生何以故由衆生根性多有差別故爾如世國王與敵共戰其有功者多不等故隨功賞職或一品二品三四五品乃至八九品無一遺者佛亦如是隨諸衆生功業多少故以九蓮攝盡無餘彼諸九品衆生配生九蓮之事今當略引經文示之觀無量壽經云上品上生者若有衆生發三種心即生彼國一者至誠心二者深心三者回向發願心又有三種衆生當得往生一者慈心不殺具諸戒行二者讀誦大乘方等經典三者修行六念佛法僧戒施天具此功德一日一夜乃至七日即得往生是人𣧩時阿彌陀佛與觀音勢至等無量菩薩現在其前授手迎接行者見已歡喜踊躍自見其身乘金剛臺隨從佛後如彈指頃往生彼國到已即見佛身相好及見菩薩色相具足光明寶林演說妙法聞已即悟無生法忍上品中生者不必受持讀誦方等經典善解義趣於第一義心不驚動深信因果不謗大乘是人𣧩時大聖來迎事如上說行者自見坐紫金臺即生彼國七寶池中其蓮經宿即開見佛菩薩放光照身目即開明經一小劫得無生忍上品下生者亦信因果不謗大乘但發無上道心是人𣧩時衆聖來迎行者自見坐金蓮華往生寶池經一日一夜蓮華乃開七日之中乃得見佛雖見佛身於衆相好心不明了三七日後乃了了見經三小劫得百法明門住歡喜地中品上生者若有衆生受持五戒持八戒齊修行諸戒不造五逆無衆過惡是人𣧩時衆聖來迎行者自見己身坐蓮華臺往生彼國蓮華尋開聞衆音聲讚歎四諦應時即得阿羅漢道三明六通具八解脫中品中生者若有衆生若一日一夜持沙彌戒若持具足戒威儀無缺是人𣧩時衆聖來迎行者自見坐蓮華上蓮華即合隨從佛後生寶池中經於七日其華乃敷開目合掌讚佛聞法經半劫已成阿羅漢中品下生者若有衆生孝養父母奉事師長行世仁義是人𣧩時遇善知識為其廣說阿彌陀佛國土樂事聞此事已尋即命終即生彼國經七日已遇觀世音及大勢至聞法歡喜得須陀洹過一小劫成阿羅漢下品上生者或有衆生作衆惡業雖不誹謗方等經典多造惡法無有慙愧是人𣧩時遇善知識為讚大乘十二部經首題名字以聞如是諸經名故除却千劫極重惡業善友復教稱於南無阿彌陀佛稱佛名故除五十億劫生死之罪爾時彼佛即遣化佛化觀世音化大勢至至行者前言善男子以汝稱佛名故諸罪消滅我來迎汝行者即見化佛光明遍滿其室見已歡喜即便命𣧩乘寶蓮華隨化佛後生寶池中經七七日蓮華乃敷時觀世音菩薩放光說法聞已信解發無上道心經十小劫得入初地下品中生者或有衆生毀犯五戒八戒及具足戒偷僧祇物盜現前僧物不淨說法無有慙愧是人𣧩時地獄衆火一時俱至遇善知識即為讚說阿彌陀佛光明威德此人聞已除八十億劫生死之罪地獄猛火化為涼風吹諸天華華上皆有化佛菩薩迎接此人如一念頃即生寶池蓮華之內經於大劫蓮華乃敷觀音勢至為說大乘甚深經典聞此法已即發無上道心下品下生者或有衆生具造五逆十惡具諸不善此人應墮惡道經歷多劫受苦無窮臨命𣧩時遇善知識為說妙法教令念佛彼人苦逼不遑念佛善友告言汝若不能念佛者應稱歸命無量壽佛如是至心令聲不絶具足十念稱南無阿彌陀佛稱佛名故於念念中除八十億劫生死之罪命𣧩之後見金蓮華猶如日輪住其人前如一念頃即往彼國生蓮華中滿十二大劫蓮華方開觀音勢至以大悲音為說實相除滅罪法聞已歡喜即發無上道心云云是為九品衆生生九蓮之相也又有宮殿受生者無量壽經云若有衆生修諸功德願生彼剎後有悔心亦復疑惑不信有彼佛剎不信有往生者亦不信布施作福後世得福其人雖爾續有念心暫信暫不信志意猶豫無所專據臨命𣧩時佛乃化現其身令彼目見其人雖不能言其心即喜乃悔不作諸善以悔過故亦生彼剎唯不能前至佛所方入邊地見七寶城即入其中於蓮華中生受其快樂如忉利天人經五百歲不聞三寶之名云云若唯諸經論說凡有衆生聞彼國名及彼佛號發願求生者無一不往如月藏經云我末法中億億衆生起行修道未有一得者唯淨土一門可通人路云云然則當此末法之時不求淨土而何也或人於此法門多生疑謗若見求生者笑而止之自誤誤人與佛為怨悲夫悲夫不爾當來世必逢慈氏尊龍華三會上自然皆證道彌勒下生經云此閻浮提有大城名翅頭末城中有大婆羅門名妙梵彌勒託生其家出家日即成正覺坐龍華樹下國王婆羅門長者一切人民俱詣佛所皆共出家時彌勒佛見諸大衆作如是念是諸人等釋迦文佛遣來付我是故今者皆至我所是諸人等在於釋迦遺法之中或讀誦經律論三藏或以衣食施人或持戒修慧或以幡蓋華香供養於佛或為苦惱衆生令其得樂或忍辱禪定或起塔寺供養舍利以此功德來至我所作是念已為說四諦諸人聞已同時得涅槃道又大論云龍華初會度九十九億聲聞第二會度九十六億聲聞第三會度九十三億聲聞又報恩經云華林園第三會九十三億人釋迦遺法中一稱南無佛人等又彌勒經云釋迦末法中坐禪誦經持戒修福等者生第一會唯持三歸者生第二會唯聞佛名者生第三會云云由是觀之我等雖未得專精禪誦及持戒修福既聞佛名又一生來隨分一稱豈敢不為然則縱未早參於初二會中而晚預於第三會上聞法悟道決無疑矣諸有智者應當發願要值此佛若差過則值佛懸遠故何者此賢劫中有成住壞空四劫苦佛出世須當住劫住劫亦有二十增減佛與須待減劫前八增減空過無佛至第九減劫四佛出焉謂人壽六萬歲時留孫佛出四萬歲時拘那含佛出二萬歲時迦葉佛出一百歲時釋迦文佛出釋迦法滅人壽增至八萬四千歲還減四千歲時彌勒佛出從釋尊入滅已後至於此時計六十億歲是乃第十減也十一十二十三十四如是四劫無佛出世故須進功不差彌勒爾至第十五減劫有九百九十五佛次第出化末後樓至佛出化後五劫矣向說諸善因俱通大小乘凡夫根性異回向亦不一或望人天樂或求四聖果雖是善果報成佛大遲緩中間無量劫徒勞虗受苦若欲速離苦應回向大乘所作大小善當回向三處先四恩三有及法界有情次佛果菩提後真如實際若如是回向毫善等虗空譬如一滴水投之於大海與海成一體深廣無涯底上示衆善通於大小行人但衆生根樂不同修因各異故所獲果報成於萬品謂或有衆生求世間樂修諸善業劣者生於人中勝者生於天上隨分受樂或有衆生厭三界苦求涅槃樂樂獨善寂修諸禪智鈍作聲聞利成支佛是名孤調解脫諸佛所訶或有衆生自雖未度欲先度他勤修精進求一切智是名大乘已成聖胎又人天則且對三塗論為樂處非實樂也何者人中現為八苦焦煎後受三途難耐之苦天上亦有五衰之苦報畢還墮三惡道中苦事可知如是輪回六趣之中無有出期誰云樂也二乘之人雖離分段生死之苦而猶未免變易之苦流落他鄉求索衣食資生艱難得少為足未得自在況復由於迃曲之徑歸家日曠苦行於塵劫焉為樂也如菩薩大人從初發心哀憫一切雙運悲智登大直道行行無滯不日到家遇見慈父獲珍寶藏受用自在無所乏短如是方名為真樂也是以永明壽禪師引經云若以十善化人如將毒藥人雖一期人天之飽而不免生死毒發終不出輪回翻增業垢若以小乘開化即是大乘冤解脫深坑可畏之處經云寧起狐狼野干心不起聲聞辟支佛意若觀此說其有智者胡不棄小而從大乎言所作諸善者謂禪誦禮念施戒等也雖作如是等善若不回向則如壞未火徒勞無益凡欲回向者不得回向人天及二乘果要當誠心回向三處何等為三一者衆生回向謂願此所修善施一切衆生二者佛果回向謂願以此功德普及於一切皆共成佛道三者實際回向謂願此所修善廣大如法性無邊空竟若虗空無盡是為三處回向又一處云回自向他回因向果回事向理此則與前同一義也言四恩者一國王恩謂民之一飲一食無非王恩而我等既為王民宜役王事歲納皇租奉報王恩而逃漏剃頭不戰而安無憂眠食王恩莫大二師長恩謂開我童蒙誡惡勸善令出世網引入佛家師恩實重三父母恩謂始自懷胎十月之中心不放捨乃至産時苦痛無極然而産已忘苦即生憐愍抱持乳養洗灌不淨及其長大亡其侍養割愛放之投師出家修出世業親恩最深四施主恩謂我等比丘縱臥山林不耕而食不蠶而衣皆是十方檀越之恩如是四恩若將比校施主之恩最為急也何者人之恆食一日兩時若闕一時心鋒已折凡所作事皆不如意何況全闕況復二日三日乃至七日然則身之與命尚難可保況修道業乎故知施主之恩為急王及師親次次也是以諸有苾芻應知此意若一禮一念燒片香然一燈獻一華掃塔塗地等一毫之善應先回向四恩奉福然後普被一切耳雖未完戒品亦未修諸善但結大乘緣功倍餘衆善大乘義云何諸法實相是聞此實相理其心不驚動暫生一念信福德已無量因發菩提心已具悲智願即為世間眼當作天人師雖在凡夫地功超二果聖是名真佛子能報諸佛恩欲入如來室斯門其舍諸言諸法實相者法華經云唯佛與佛乃能究盡諸法實相又云一切世間治生産業皆與實相不相違背祖師釋云一一生滅一一殺盜四倒八邪五逆十惡皆是實相此事彰灼當處真常誰人不具何法不然故經云世間相常住悟此妙理名之為佛迷之曰生由其迷悟且分高下本則不殊猶氷與水喻之可知故淨名云平等真法界佛不度衆生云云若有衆生聞此法已乃至生於一念信解功蓋無學不可為比故法華經云此經難持若暫持者我則歡喜諸佛亦然是名持戒行頭陀者是諸天人世間之眼云云又諸大乘經所說大乘之言多種或云色不異空空不異色或云諸佛衆生平等無差或云煩惱即菩提生死即涅槃如是等言雖則不同義則是一俱不出於諸法實相也夫大乘之為功力者信則剎那成佛謗則即墮泥黎然受罪畢已還聞此法即便悟道矣如文殊經云有人聞說般若起謗不信即墮地獄勝於供養恆沙佛者何以故供養恆沙佛祇得人天生滅之福若聞般若毀謗墮地獄受謗法罪畢以聞般若為種才聞說般若便得心開剎那成佛又無行經云昔者有一淨威儀法師憐愍衆生教化令發阿耨菩提心又有威儀比丘雖能護戒不能善於菩薩所行之道於後淨威儀法師過威儀比丘知不信大乘戒誹謗入地獄地獄罪畢因聞此法為悟道之因強說一偈頌曰貪欲即是道瞋癡亦復然如是三法中具一切佛法威儀比丘聞已誹謗命𣧩墮阿鼻獄九十百千億劫受諸苦惱從地獄出六十三萬世常被罪誹謗其罪漸薄後作比丘三十二萬世出家之後是業因緣反道入俗乃至無量千萬世諸根暗鈍爾時威儀比丘豈異人乎則我身是我聞此大乘法雖不信受起謗墮獄受其罪畢因聞大乘故乃得成佛云云按諸經論說持戒堅固在於像法之始彼時也去聖不遠人性稍純持戒不難然而當時人亦持少犯多況今末法去聖逾邈人根下劣無有堅實於戒浮囊寧無缺漏囊如未完可能渡於生死海耶是以雖不護戒但結大乘之種功必倍之故天台師云如來出世說法之時乘戒俱急者以人天身聞法悟道乘急戒緩者以三途身聞法得道乘緩戒急者著樂人天不預法會乘戒或俱緩既沉惡趣復遠大道云云以此觀之寧可戒緩不可乘緩矣言菩提心者上求佛道下化群生之心也是心乃三世諸佛之所讚歎故涅槃經云發心畢竟二不別如是二心先心難自未得度先度他是故我禮初發心又華經云若以華雲鬘雲天音樂雲乃至天種種香然種種燈一一燈炷如須彌山一一燈油如大海水以如是等諸供養具常為供養不可說不可說佛剎極微塵數一切諸佛所得功德不及菩提心供養一念功德百分不及一千分不及一乃至優婆尼沙陀分亦不及一云云言報佛恩者慈悲懺經云諸佛念衆生過於父母父母念兒慈止一世佛念衆生慈心無盡又父母見兒背恩違義心生恚恨慈心薄少諸佛不爾見諸衆生不信經教悲心益重乃至入於無間地獄代受衆苦如是大恩云何能報若使起立塔廟精舍燈燭幡蓋華香茵蓐種種供養將來之世自受其福非報佛恩若發菩提心修淨土行是名智者知報佛恩云云是以二乘雖住果地而未及於初發心凡夫菩薩所有功德萬分之一大論問曰羅漢辟支是離欲人或有凡夫但發菩提心者云何得勝答曰菩薩有其二種一者行諸波羅蜜二者但密發心行菩薩道雖事未成能勝二乘何以故譬如太子雖未即位勝諸大臣有位富貴者優婆塞戒經云出家人發菩提心此不為難在家之人固難可發何以故多惡因緣所纏繞故發菩提心者諸天皆大歡喜作如是言我今已得天人之師毗尼經云若初修大乘行菩薩戒晨朝有犯應當結罪至午菩提心無間斷戒聚成就則非所犯乃至中夜有犯至後夜菩提心無間斷戒聚成就寶積經云若人打截大千衆生若有惡心惱發菩提心人其罪過是常樂住蘭若不然隨衆居群居須慎口獨處要防心遠離惡知識當從善友教身不離袈裟食當須應器手不釋黃卷不樂看外書目不視女人見之猶毒蛇非病晝不臥臥則須右脅非飢不餘食食則須節量寢不敷茵蓐眠亦不放恣坐必不背西行時但視地語常離戲笑取要不應多受嚫作三分不宜全受破勿得畜物多以作障道緣亦勿繁眷屬增長憍瞋慢如是若干事沙門急先務苟不能如是豈得名浮圖雖受四事供猶如吞餌魚當來必償債得無慙且懼言阿蘭若者此云無憒閙處夫住蘭若則三業自然清淨即具無量功德取道不難矣故華嚴經云住蘭若者成就清淨威儀成就諸根不亂成就正法現前云云凡欲疾得一切種智者胡不樂住阿蘭若哉若不爾則應當預於伽藍衆會中居是則本自懶墯雖未得自專修道見他精進耻而效之不敢放逸凡所動作施為乃至朝中粥一皆從衆未嘗違規由是道行任運離染入釋子數如常所云蓬生麻中不扶自直者歟是故懈怠之者不如隨衆慎勿間遊山野之間恣情為惡虗送光陰以為後日悔歎之緣又不得為求安求飽故部落溪湄漁村岸上結草為庵止宿資生與白衣庸俗結交同志稱為兄弟或稱父母無惡不造非獨自身失行亦浼清淨佛圖罪應不少言善友者毗奈耶中云阿難白佛言善知識者是半梵行諸修行者由善友力故方能成辦故佛言是全梵行若得善伴與其同住乃至涅槃無事不辦故名全梵行又孛經云友有四一如華友謂好時插頭萎時棄地見富貴則附貧困則捨二如稱友謂物重低頭物輕則昂有與則敬無與則謾三如山友謂金山鳥獸集之毛羽蒙光貴能榮人富樂同歡四如地友謂百穀財物一切仰之施給養護恩厚不德因果經云波羅門優陀夷聰明多智淨王勑為太子友白太子言朋友有三要法一者見有失輒相曉諫二見好事深生隨喜二在苦厄不相棄捨四分律云具七法萬成親友一難作能作二難與能與三難忍能忍四密事相告五互相覆藏六遭苦不捨七貧窮不輕迦越經云朋友五事一見作惡往屏處曉諫訶止二所有急事當奔赴救護三所有私語不得說向他人四常相敬歎好事當多少分與之若常懷嫉慢心不節慎口無法言惡人為友此名庸人佛本行經云佛與難陀至魚肆佛令難陀取小藉魚草握少時棄之令嗅手問之難陀曰唯有腥臭之氣又至香店令取裹香紙掬少時棄之復問難陀答曰唯聞香氣佛語難陀善友惡友相染習亦復如是若近善友必定當得廣大名聞云云惡知識者非是向我毀辱打罵者也見我為惡而不諫之隨喜讚之令長不善之業乃至為我尊敬供養者皆是惡友故南嶽師云世間道俗欽仰供養殷勤請講皆是惡魔所使非善知識是惡知識如冤詐親苦哉苦哉諸王剎利亦復如是擇擇擇擇言袈裟者從色為名此云壞色梵網經云青黃赤黑紫作皆名壞色注云壞本白色違愛心故亦三衣之都稱三衣者一安陀會五條也二多羅僧七條也三僧伽梨九條也又有十一條乃至二十五條於中長短廣狹裁縫之法具如章服儀及六物圖中說悲華經云釋迦如來於寶藏佛所發願願我成佛時我袈裟有五種功德一者入我法中犯重邪見等四衆於一念中敬心尊重必於三乘受記二者天龍人鬼若能恭敬此袈裟小分即得三乘不退三者若有鬼神諸人得袈裟段乃至四寸飲食充足四者若有衆生共相違反念袈裟力則尋生悲心五者若在兵陳袈裟小分恭敬尊重常得勝他若我袈裟無此五力則欺誑十萬諸佛有云龍得袈裟一𮈔掛其門上則免金翅鳥難大悲經云披著袈裟者於彌勒佛乃至樓至佛所得入涅槃無有遺餘永明壽禪師云夫袈裟者名解脫幢十方諸佛依之而得道果四衆非人持之而獲安隱顯示清間破除熱惱若匪離塵之上服安能拯濟於迷途功不唐捐歎不可盡云云言應器者梵云鉢多羅也佛制瓦鐵為勝其體量大小及其功德優劣如六物圖中引示比丘十八物中袈裟與鉢為急如鳥兩翼如車二輪闕一不可四分律云若比丘闕袈裟與鉢受他供養者准於千劫斷牛頭罪是故比丘袈裟與鉢常隨其身不可暫離言黃卷者佛經也如向所示漢明時佛經道經同焚試驗道經為灰佛經不燒但烟熏為黃色而已爾後造經者表之皆染紙為黃色焉夫間中師友莫若佛書於中所說皆是諸佛菩薩行因得果無量功德及教衆生禁惡行善捨邪歸正種種因緣真實之語若能讀文尋義慕仰聖賢感己傷他如是操心過日則衆緣稍息身心自淨玄境可攀勿得悠悠虗消白日其有不能自專覽經者宜當求問於知之者隨分學之一日一句亦得然則二日二句乃至十日十句百日百句如是不闕日課則識非不博如其遲滯一聞而不通者若再聞三聞乃至十聞則何所不通雖未究達幽深之義豈不異昔全蒙之日由是漸漸修學通達妙理入甘露門可不快乎然則猶勝無知鳥空盲禪寧不賢於終日虗談戲笑之徒但懶惰無心而已苟能用力勤學而不達者未之有也言外書者韋陀典籍及諸家文書篇集等誤人之虗談也故法華經云及造世俗文筆讚詠外書如是之人皆勿親近又大論云習外典者如以刀割泥泥無所成而刀日損又云讀外典者如視日光令人眼暗止觀輔行記云讀春秋誦左傳終朝心遊戰陳口演詐謀助佛法者遠矣云云如莊老孔孟之道雖非究竟之辭而文弘仁義故為新學入道之門亦可時覽何以故毗奈耶中云佛聽比丘學外論於一日分三初中二分讀誦佛經晚讀外書故祇洹中有書院置大千界內文書佛聽比丘遍讀為降外道故不許依其見解又不得為好而廢道業言目不視女人者女人是世出世間障生之本世間障者在天子位由之而亂其國公卿大夫由之而不能治其家士庶人民由之而失其身況欲出世者可不畏慎又衆生煩惱貪欲為本若見女色淫心忽生熾不可禁由茲作諸方便遂得犯觸一觸然後心不厭足無有退捨如蛾赴火不可禁制亦如鐵鎚投於淤泥永無出期一切患難由之而生於無量劫輪回生死未有入道之門是以我佛如來諸經教中苦切訶之歷代諸祖論傳記章亦復如是華嚴經中威德主太子訶論最切是故欲渡愛河應須遠離一切女人若有因緣不得已而見之則如見毒蛇猶避火坑昔清涼祖師隔帳看母況諸女人而直見之乎晝臥者諸放逸中甚不可也如來誡諸比丘夜亦不臥何況晝臥世間之道亦不宜也故仲尼訶宰豫曰朽木不可雕也云云若有疾病須臥則當右脅著地不得尸臥餘食者如來初制比丘一日一食後羅睺羅幼少出家飢而啼之佛為止啼且許朝粥後世比丘見此開門朝粥中食以為恆式是以此兩時外皆為餘食若失朝中非時得食不食則佳食亦無妨何者飢羸無力則道業難成故止觀論云食不節易成病又博物志云雜食者百疾妖邪之所鍾食逾少心逾明食逾多身逾損故食不過度寢不茵蓐者凡修道人不能成功者專由眠魔之所逼惱雖氷牀雪被不覺中來令人無力何況厚敷茵蓐申腳大臥則安得却之所以眠熟惛沉猶如死人不知夜之旦日之暮奚暇攝心做功乎是故比丘臥眠之時但橫衣枕拳勿得放恣少時歇已即起灌漱隨其所為禪誦禮念而不失時終身不已然則雖未辦道名善士也坐不背西者昔新羅義湘祖師專求安養平生坐不背西其門徒中有一犯罪比丘依法擯之離群出去遊行他界仰慕其師造像負行師聞之召來告曰汝若實憶我者我一生來坐不背西像亦應爾於是令像背西而坐像自回身向西而坐師乃善之赦罪還攝是故求西應仰效之又若行時但視地一心念佛而行不得左右遊目令心散亂如戲人行況春夏秋三時踏殺微蟲無端造罪可乎又復與人語時無得戲笑高聲妄發唯取其要不須煩雜故外典亦云君子寡辭如有所言三思而後發言無枝葉受嚫分三者毗奈耶中云若比丘受檀施則須作三分一上三寶一與同行者及貧病人一自受用是則已具悲敬二心能報檀恩為真釋子又比丘不得多畜長物若多有財物則日夜計算或謀與利或恐人盜或恐王奪或水火失以此經懷少時不忘奚暇念佛誦經乎雖或誦念異緣交雜心不專一功業不成可知是以如來誡諸比丘三衣之外不畜餘長又不得多有眷屬未得道前所有眷屬多損於己都無小益何者憍瞋慢心由茲而長如是三心法中大障是故經云修心之士常樂遠離獨處間靜若要多畜則成魔業言四事者飲食衣服臥具醫藥也其有施主為求福故減己養妻子之分用施於僧而僧若闕戒行威儀又闕禪誦禮念則所有信施尚不能消況云與福是則當來必償其債可不懼哉又償債報恩事有多途難可定說今依經說略示三等謂輕重中何謂為輕若僧雖知因果而缺威儀未能如法操心修行與施主意乖事不稱理者後作檀家奴婢僕從為營家業心無厭怠何謂為中若僧但口說因果心不相符於施者受者及所施物橫計自他論說是非不生一念報恩之心者後作駝驢牛馬牽車耕田負載輸運飢渴鞭箠不憚勞苦何謂為重若僧不知因果恆起貪心其有施主雖給千財具陳百味種種供養不以為足如海納流者後作猪羊鵝鴨以身供喰是為三等報施主恩如是償債非止一生隨其受恩多少次近歷二生三生乃至十生百千萬生不可定論如斯因果若形影相從必不毫差如雲光法師未免牛報新羅比丘化為樹茸如是現驗不可殫記具如珠琳傳及李詭祖傳是以涅槃梵網等經中佛誡諸菩薩云寧以百千刀槍斬刺其身終不破戒之身受信心檀越所施衣服寧百千劫吞熱鐵丸終不以破戒之口受信心檀越所施飲食於戲若覩是誡則如我等無戒禿人可得放慮恣情任受信施乎是以須當食時量彼來處忖己德行全缺應供防心離過貪等為宗正事良藥為療形枯為成道業應受此食復作是念我口如竈栴檀糞穢隨得而燒不得欣厭精粗故長蘆和尚云飲食之侈不除解脫之期安在又於衣服作是念言但要掩其醜形非是嚴身為美何必取其細輕而自捨於粗重是以上根志道之士忘其身口之資唯煮藜以充飢又細草而蔽質中者常行乞食衣唯百衲三衣下流不得如然必借檀緣而活然彼檀恩莫重應須節量受之蔬糲之食難消不得全供玉粒大布之衣亦好何須絹帛綾羅何者旨味珍羞促其壽價高華服損其福壽福若未完則道業焉能就乎故我能仁大覺捨金輪而入山食止一麥一麻衣是鹿皮粗布如是難行苦行乃成無上菩提普告新學諸生仰慕本師高節勿著身口之養勤修定慧之功早登解脫之門先濟受恩之者是曰知恩而報何憂償債之勞如上許多事散在諸經論今集成略頌一代義鍾茲如海一滴水具含百川味一嘗知衆味諸生莫輕忽今無寄也雖霑僧品推其所行則戒品也蓋闕禪定也蓋闕誦念也蓋闕禮懺也蓋闕布施也蓋闕乃至小善無一修之凡有諸惡無一不造何不愧於佛天乎淨名云自疾不能救而能救諸疾人若觀斯語則匿己過而欲改他過者亦可愧人歟然今但取自未得度先度他之義耳愚遊諸山野及至都城而遍閲祝髮被緇者多於竹葦除中上者其餘下愚之輩所行之業良可耻之或有比丘世俗文書尚不能知況云解佛經義乎無宿福故今則乏短資生艱難慮其養身口之費假憑佛事雙雙伍伍繞村隨戶區區乞丐但懷多取豈念福他既聚集已互用無度謂營勝事成餓鬼業或有比丘粗記文字但得一經二經隨文讀誦昧其義趣又不聞見釋尊一代起盡之事自謂法師不淨說法誑惑衆人濫受信施無有慙愧成旁生業或有假名禪和子袈裟衲衣藜杖瓢鉢外似忘機內無實德未遂禪功但執古人公案非訶大乘經典成阿鼻業或有依禪附教出家學道者才預門庭未窮禪教深奧之旨各生妄執更相破毀成諍論地獄業或有比丘違佛禁法經紀息利多有財産或附王公大臣之勢自恃富強𣣋他貧弱貪淫嗜酒或讚詠外書朋伴俗人更相唱和或樂雜戲圍棊博奕琴瑟簫笛諸不善法如是恣情無惡不造成三途業嗚呼是等豈曰不知善惡業報利養心強故任為之外書亦曰刑故無少胡不懼之是以處山野而未免農樵之誚遊城隍而多為卿士之譏由是之故令法危之不可忍睨也夫法不自弘弘之在人人若不能法寧久住昔者魏帝破滅大法者蓋以其時沙門違佛戒律多行放逸故也此則自召其殃然後王乃加之耳可不鑑焉觀今之勢幾乎彼世危哉危哉小僧雖不敏也將恐將懼發此狂言請諸仁者勿謂狂人之語不足為信覩彼明鑒各秉其志袽窒法般度生死海度己度他展轉相承令法不墜則其利博哉且古之人重法而不取人如天帝拜畜為師雪山從鬼請偈若一言一句有益於己師之過惡何有於我哉如臭囊中金不以囊臭而弃其金況今之所録非從臆說皆佛祖言來者詳之外傳云知鳳一毛足矣知錦一文備焉又云合抱之木起於毫末千里之行始於足下學佛者亦然若覽此頌則已染指於一代之教亦始足於五位之行智者在茲念茲毋輕毋忽天台始祖龍樹大士云有聞無智慧亦不知實相譬如大暗中有目無所見有慧無多聞亦不知實相譬如大明中有燈無所照有聞有智慧是所說應受無聞無智慧是名人身牛今有浮庵長老無寄早投於白蓮社第四世真淨國師之嫡嗣釋教都僧統覺海圓明佛印靜照大禪師而安堂下落髮披緇法名雲默學通一家文義赴於選席中上上科得窟嵓住持之名高步名途一旦唾弃猶弊屣也乃遊歷金剛五臺等名山勝地竟到始興山卓一庵而樓遲以誦蓮經念彌陀𦘕佛書經為日用者垂二十年矣餘力搜尋佛典祖文撰述本師行迹頌并注乃成兩軸以啓童蒙利莫廣焉噫娑婆世界成住壞空劫數長短三界五趣壽福優劣苦樂差別如來方便隨類示現四土三身五時說法年月次第諸經部內半滿偏圓本迹權實乃至滅後遺法流行隆夷處近及後進學者修行入道方便之規如明鏡當臺無一毫差真可謂吾祖所云是所說應受者明矣善哉未曾有也其文辭之格吾欽袵無間然矣時天歷三年庚午二月八日萬德山白蓮社沙門豈跋
